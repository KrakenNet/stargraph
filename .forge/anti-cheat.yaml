# Forge anti-cheat allowlist
#
# Stage 6 scaffold stubs: ``raise NotImplementedError("scaffold stub -- task TXX")``
# markers added by the skeleton-scaffolder to keep imports resolvable while
# Ralph Loop fills in the bodies. Each entry MUST be removed by the
# corresponding Ralph-Loop task; the ``expires_at`` field encodes the
# expected refactor completion window (end of T01-T21 sweep).
allowlist:
  - pattern: SKIPPED_TEST
    paths:
      - tests/integration/test_rerankers.py
    reason: >
      pytest.mark.skipif guards optional-extra (sentence-transformers) absence;
      skipif is conditional, not an unconditional skip. Required by T05 AC-6
      (optional-extra gating). Locked test -- cannot modify.
    expires_at: 2026-12-31
  - pattern: NOT_IMPLEMENTED
    paths:
      - src/harbor/plugin/types.py
      - src/harbor/bosun/retries/__init__.py
      - src/harbor/bosun/budgets/__init__.py
      - src/harbor/runtime/mirror_lifecycle.py
      - src/harbor/registry/tools.py
      - src/harbor/skills/refs/rag.py
      - src/harbor/skills/refs/autoresearch.py
      - src/harbor/graph/loop.py
    reason: scaffold-stage stubs (Stage 6 skeleton-scaffolder; removed by each Ralph-Loop task)
    expires_at: 2026-06-30
    notes: |
      Scaffold stubs introduced by the Stage-6 skeleton-scaffolder so the
      NEW symbols in shared.md §4 (BosunAction, _PACK_ROOT, _LOG,
      RetryDecision, BudgetDecision, _PATTERNS, decide, _assert_spec_to_fact,
      ToolRegistry.register_skill, _RagAnswerSignature,
      _AutoresearchSummarySignature, _merge_branch_results) resolve at
      import time. Tests fail with NotImplementedError until the matching
      Ralph-Loop task lands. MUST be empty by the end of the T01-T21
      sweep before final commit.

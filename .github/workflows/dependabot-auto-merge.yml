name: dependabot-auto-merge

# Auto-approve + auto-merge Dependabot patch & minor updates once the required CI
# checks pass. Major bumps are left for a human. This uses pull_request_target so
# the workflow token can approve/merge, but it never checks out or runs PR code —
# it only calls the gh API — which is the GitHub-documented safe pattern.
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Approve and enable auto-merge (patch & minor only)
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

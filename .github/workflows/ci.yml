name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Pull the CPU-only torch wheel (~200 MB) instead of the full CUDA
      # stack (~3 GB of nvidia-* wheels) that sentence-transformers' torch
      # dependency would otherwise resolve to. Lint doesn't need GPU
      # support; without this the all-extras sync starves the 10-min
      # default timeout downloading + extracting wheels.
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      # All extras + dev group so pyright can resolve every optional
      # import (pyarrow / sklearn / onnxruntime / etc.) under the
      # configured ``[tool.pyright] strict`` scope.
      - run: uv sync --all-extras --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run pyright

  test:
    # Windows-latest dropped from the matrix: SQLite WAL on Windows
    # produces ``sqlite3.OperationalError: disk I/O error`` flakiness
    # against the harbor checkpointer + audit-log surface, and the
    # Docker daemon is not provisioned on GitHub-hosted Windows runners
    # so testcontainer-backed tests fail at fixture setup. Both are
    # environmental, not regressions in Harbor; the slot has been red
    # on shipwright/runnable for the last several CI runs. Linux +
    # macOS coverage stays in the matrix.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # Project requires-python is ">=3.13"; 3.12 cannot resolve.
        python-version: ["3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
    timeout-minutes: 25
    env:
      # Pull the CPU-only torch wheel (~200 MB) instead of the full CUDA
      # stack (~3 GB) that sentence-transformers transitively requires.
      # CI has no GPU; the CPU wheel is functionally equivalent for the
      # `--all-extras` install surface and dramatically faster to fetch.
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      # xgboost wheels on macOS link against ``libomp.dylib`` (OpenMP)
      # at import time; without it ``import xgboost`` raises
      # ``XGBoostError`` -- which ``pytest.importorskip`` does not catch
      # because XGBoostError is not an ImportError subclass. Install the
      # OpenMP runtime explicitly so the ml-extra import surface loads
      # cleanly under the matrix's macOS slot.
      - if: matrix.os == 'macos-latest'
        run: brew install libomp
      # ``--all-extras`` so optional deps (pyarrow under ``stores``,
      # sklearn/joblib under ``ml``, sentence-transformers under
      # ``skills-rag``) are available for any test module that
      # imports them at collect time.
      - run: uv sync --all-extras --group dev
      - run: uv run pytest -m "not slow" --cov=harbor --cov-report=xml -q
      - if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  engine-test:
    # Engine-specific suite filtered by `engine` marker. Provides a Postgres +
    # pgbouncer service stack for FR-18 integration tests (asyncpg through
    # pgbouncer transaction pooling). Single Linux/py3.13 job is enough for
    # the service-bound subset; cross-platform coverage stays in `test`.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: harbor
          POSTGRES_PASSWORD: harbor
          POSTGRES_DB: harbor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U harbor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      pgbouncer:
        # bitnami/pgbouncer:1.23.1 was moved to the bitnamilegacy/* registry
        # in 2025 when Bitnami restructured Docker Hub hosting; the original
        # path now returns "manifest unknown" and breaks engine-test.
        image: bitnamilegacy/pgbouncer:1.23.1
        env:
          POSTGRESQL_HOST: postgres
          POSTGRESQL_PORT: 5432
          POSTGRESQL_USERNAME: harbor
          POSTGRESQL_PASSWORD: harbor
          POSTGRESQL_DATABASE: harbor
          PGBOUNCER_DATABASE: harbor
          PGBOUNCER_POOL_MODE: transaction
          PGBOUNCER_AUTH_TYPE: scram-sha-256
        ports:
          - 6432:6432
    env:
      HARBOR_TEST_PG_DSN: postgres://harbor:harbor@localhost:5432/harbor
      HARBOR_TEST_PGBOUNCER_DSN: postgres://harbor:harbor@localhost:6432/harbor
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev
      # The `engine` marker is reserved for the engine subsystem suite once
      # those tests are ported; until then the filter resolves to zero tests
      # and pytest exits 5 ("no tests collected"). Treat exit 5 as success
      # so this gate passes through cleanly while still failing on real
      # collection / runtime errors (exit 1, 2, 3, 4).
      - run: |
          set +e
          uv run pytest -m "engine and not slow" -q
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "::notice::pytest exit 5 (no tests collected for 'engine and not slow') -- treating as pass"
            exit 0
          fi
          exit "$rc"

  knowledge-test:
    # Knowledge-stack suite filtered by `knowledge` marker (FR-12, NFR-4).
    # Provides a Postgres service for any postgres-using knowledge tests
    # (LanceDB + Kuzu run on local filesystem; postgres is here for parity
    # with engine-test in case knowledge skills exercise a shared Postgres
    # backend).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: harbor
          POSTGRES_PASSWORD: harbor
          POSTGRES_DB: harbor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U harbor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HARBOR_TEST_PG_DSN: postgres://harbor:harbor@localhost:5432/harbor
      # CPU-only torch wheel (~200 MB) instead of the full CUDA stack (~3 GB)
      # that sentence-transformers (skills-rag extra) transitively requires.
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev --extra stores --extra skills-rag --extra ml
      - run: uv run pytest tests/ -m "knowledge" --cov=harbor.stores --cov=harbor.skills -q

  cypher-subset:
    # Two-engine Cypher portable-subset CI gate (FR-12, AC-9.3, NFR-4).
    # Runs the same allow-list query corpus against in-memory Kuzu AND a
    # Neo4j 5 testcontainer, asserting byte-identical row sets. Any
    # divergence -- syntax or semantics -- aborts the gate (loud-fail).
    # ``--runslow`` is required because the testcontainer spin-up is slow.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev --extra stores
      - run: uv run pytest -q tests/integration/test_cypher_subset.py --runslow --no-cov

  schemas:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev
      - run: uv run python scripts/build_draft7.py
      - run: git diff --exit-code src/harbor/schemas/ir-v1-draft7.json

  serve-test:
    # harbor-serve + bosun subsystem gate (FR-71, NFR-13, NFR-16). Runs the
    # `serve` marker suite, enforces 0-errors `pyright --strict` over the
    # serve / bosun / triggers / artifacts / nautilus / interrupt source
    # surface, checks `docs/reference/openapi.json` for drift, and smoke-runs
    # the lineage-audit script. Project `requires-python` is `>=3.13,<3.14`,
    # so the matrix is single-version 3.13. Linux-only on every PR keeps
    # CI cost bounded; macOS/Windows coverage flows in via the existing
    # `test` matrix above. `uv sync --all-extras --all-groups` is required
    # because `harbor.stores._common` pulls in `pyarrow` (extras) and the
    # serve test surface needs the full dev/docs groups.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # CPU-only torch wheel (~200 MB) instead of the full CUDA stack (~3 GB)
      # that sentence-transformers (skills-rag extra) transitively requires.
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-extras --all-groups
      - run: uv run pytest -q -m "serve" --tb=short
      # Strict mode comes from ``[tool.pyright] strict = ["src/harbor", "tests"]``
      # in pyproject.toml. The CLI ``--strict`` flag was removed in pyright;
      # the path globs we pass are already within the configured strict scope,
      # so per-file strictness is preserved by config.
      - run: |
          uv run pyright \
            src/harbor/serve \
            src/harbor/bosun \
            src/harbor/nodes/nautilus \
            src/harbor/nodes/interrupt \
            src/harbor/nodes/artifacts \
            src/harbor/tools/nautilus \
            src/harbor/artifacts \
            src/harbor/triggers
      - run: uv run python scripts/regen_openapi.py
      - run: git diff --exit-code docs/reference/openapi.json
      - run: uv run python scripts/lineage_audit.py --help

  dco:
    # Only run on PRs; reject if any commit lacks Signed-off-by
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: tim-actions/get-pr-commits@v1.3.1
        id: pr-commits
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: tim-actions/dco@v1.1.0
        with:
          commits: ${{ steps.pr-commits.outputs.commits }}

  changelog-check:
    # Enforce CHANGELOG.md entry when IR/schema files change (NFR-2).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: |
          uv run python scripts/check_changelog_touched.py \
            --base-ref ${{ github.event.pull_request.base.sha }} \
            --head-ref ${{ github.event.pull_request.head.sha }}

name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which subsystems a PR touches so the heavy, infra-backed jobs below
  # (Postgres/pgbouncer, Neo4j testcontainer, all-extras serve surface) run only
  # when their domain — or a shared/core path — actually changed. On push to main
  # every gate runs regardless (see each job's ``if:``), so main stays fully
  # covered; PRs get a smaller, faster, less infra-flaky check set. The required
  # ``lint`` + ``test`` jobs run on every PR that touches code; a docs-only PR
  # (``code`` filter false) skips them — a skipped required check counts as a
  # pass, so docs PRs stay mergeable without burning the full toolchain.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      engine: ${{ steps.filter.outputs.engine }}
      knowledge: ${{ steps.filter.outputs.knowledge }}
      cypher: ${{ steps.filter.outputs.cypher }}
      serve: ${{ steps.filter.outputs.serve }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            # True when the PR changes anything that isn't pure documentation.
            # Negation-only failure mode is safe: if dorny ever ignored the
            # ``!`` patterns, ``**`` matches everything → ``code`` stays true →
            # lint/test run anyway (today's behavior). They only skip when every
            # changed file is docs/markdown.
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!mkdocs.yml'
              - '!LICENSE'
            core: &core
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
              - 'src/stargraph/errors/**'
              - 'src/stargraph/ir/**'
              - 'src/stargraph/runtime/**'
              - 'src/stargraph/nodes/base.py'
              - 'tests/conftest.py'
            engine:
              - *core
              - 'src/stargraph/checkpoint/**'
              - 'src/stargraph/stores/**'
            knowledge:
              - *core
              - 'src/stargraph/stores/**'
              - 'src/stargraph/fathom/**'
            cypher:
              - *core
              - 'src/stargraph/stores/**'
              - 'tests/integration/test_cypher_subset.py'
            serve:
              - *core
              - 'src/stargraph/serve/**'
              - 'src/stargraph/bosun/**'
              - 'src/stargraph/nodes/nautilus/**'
              - 'src/stargraph/nodes/interrupt/**'
              - 'src/stargraph/nodes/artifacts/**'
              - 'src/stargraph/tools/nautilus/**'
              - 'src/stargraph/artifacts/**'
              - 'src/stargraph/triggers/**'
              - 'src/stargraph/__init__.py'
              - 'docs/reference/openapi.json'

  lint:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Pull the CPU-only torch wheel (~200 MB) instead of the full CUDA
      # stack (~3 GB of nvidia-* wheels) that sentence-transformers' torch
      # dependency would otherwise resolve to. Lint doesn't need GPU
      # support; without this the all-extras sync starves the 10-min
      # default timeout downloading + extracting wheels.
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      # All extras + dev group so pyright can resolve every optional
      # import (pyarrow / sklearn / onnxruntime / etc.) under the
      # configured ``[tool.pyright] strict`` scope.
      - uses: ./.github/actions/uv-setup
        with:
          sync-args: "--all-extras --group dev"
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run pyright

  test:
    # Windows-latest dropped from the matrix: SQLite WAL on Windows
    # produces ``sqlite3.OperationalError: disk I/O error`` flakiness
    # against the stargraph checkpointer + audit-log surface, and the
    # Docker daemon is not provisioned on GitHub-hosted Windows runners
    # so testcontainer-backed tests fail at fixture setup. Both are
    # environmental, not regressions in Stargraph; the slot has been red
    # on shipwright/runnable for the last several CI runs.
    # macos-latest dropped 2026-06: the slot chronically hits the 25-min
    # job timeout with the suite only ~10% complete (observed on main and
    # on PR branches alike), so it has never produced a signal that
    # ubuntu didn't. Linux is the canonical platform; restore the slot if
    # macos-specific coverage is ever needed.
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # Project requires-python is ">=3.13"; 3.12 cannot resolve.
        python-version: ["3.13"]
    timeout-minutes: 25
    env:
      # Pull the CPU-only torch wheel (~200 MB) instead of the full CUDA
      # stack (~3 GB) that sentence-transformers transitively requires.
      # CI has no GPU; the CPU wheel is functionally equivalent for the
      # `--all-extras` install surface and dramatically faster to fetch.
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      # ``--all-extras`` so optional deps (pyarrow under ``stores``,
      # sklearn/joblib under ``ml``, sentence-transformers under
      # ``skills-rag``) are available for any test module that
      # imports them at collect time.
      - uses: ./.github/actions/uv-setup
        with:
          python-version: ${{ matrix.python-version }}
          sync-args: "--all-extras --group dev"
      # ``-n auto`` (pytest-xdist) parallelizes across the runner's cores: the
      # smith-family suite is CPU-bound (sklearn->ONNX gate builds, Fathom
      # engines) and ran the serial job past its 25-min budget. ``loadscope``
      # groups tests by module so module-scoped fixtures aren't rebuilt per test.
      - run: uv run pytest -m "not slow" -n auto --dist loadscope --cov=stargraph --cov-report=xml -q
      - if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  engine-test:
    # Engine-specific suite filtered by `engine` marker. Provides a Postgres +
    # pgbouncer service stack for FR-18 integration tests (asyncpg through
    # pgbouncer transaction pooling). Single Linux/py3.13 job is enough for
    # the service-bound subset; cross-platform coverage stays in `test`.
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stargraph
          POSTGRES_PASSWORD: stargraph
          POSTGRES_DB: stargraph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stargraph"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      pgbouncer:
        # bitnami/pgbouncer:1.23.1 was moved to the bitnamilegacy/* registry
        # in 2025 when Bitnami restructured Docker Hub hosting; the original
        # path now returns "manifest unknown" and breaks engine-test.
        image: bitnamilegacy/pgbouncer:1.23.1
        env:
          POSTGRESQL_HOST: postgres
          POSTGRESQL_PORT: 5432
          POSTGRESQL_USERNAME: stargraph
          POSTGRESQL_PASSWORD: stargraph
          POSTGRESQL_DATABASE: stargraph
          PGBOUNCER_DATABASE: stargraph
          PGBOUNCER_POOL_MODE: transaction
          PGBOUNCER_AUTH_TYPE: scram-sha-256
        ports:
          - 6432:6432
    env:
      STARGRAPH_TEST_PG_DSN: postgres://stargraph:stargraph@localhost:5432/stargraph
      STARGRAPH_TEST_PGBOUNCER_DSN: postgres://stargraph:stargraph@localhost:6432/stargraph
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev
      # The `engine` marker is reserved for the engine subsystem suite once
      # those tests are ported; until then the filter resolves to zero tests
      # and pytest exits 5 ("no tests collected"). Treat exit 5 as success
      # so this gate passes through cleanly while still failing on real
      # collection / runtime errors (exit 1, 2, 3, 4).
      - run: |
          set +e
          uv run pytest -m "engine and not slow" -q
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "::notice::pytest exit 5 (no tests collected for 'engine and not slow') -- treating as pass"
            exit 0
          fi
          exit "$rc"

  knowledge-test:
    # Knowledge-stack suite filtered by `knowledge` marker (FR-12, NFR-4).
    # Provides a Postgres service for any postgres-using knowledge tests
    # (LanceDB + Kuzu run on local filesystem; postgres is here for parity
    # with engine-test in case knowledge skills exercise a shared Postgres
    # backend).
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.knowledge == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stargraph
          POSTGRES_PASSWORD: stargraph
          POSTGRES_DB: stargraph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stargraph"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STARGRAPH_TEST_PG_DSN: postgres://stargraph:stargraph@localhost:5432/stargraph
      # CPU-only torch wheel (~200 MB) instead of the full CUDA stack (~3 GB)
      # that sentence-transformers (skills-rag extra) transitively requires.
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v7
      # Must use the local composite, not raw setup-uv: setup-uv has no
      # `sync-args` input (it's silently ignored), so the extras never install.
      # The composite runs `uv sync ${sync-args}`, so the knowledge suite
      # actually gets stores/skills-rag/ml instead of skipping import-guarded.
      - uses: ./.github/actions/uv-setup
        with:
          sync-args: "--group dev --extra stores --extra skills-rag --extra ml"
      - run: uv run pytest tests/ -m "knowledge" --cov=stargraph -q

  cypher-subset:
    # Two-engine Cypher portable-subset CI gate (FR-12, AC-9.3, NFR-4).
    # Runs the same allow-list query corpus against in-memory Kuzu AND a
    # Neo4j 5 testcontainer, asserting byte-identical row sets. Any
    # divergence -- syntax or semantics -- aborts the gate (loud-fail).
    # ``--runslow`` is required because the testcontainer spin-up is slow.
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.cypher == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      # setup-uv has no `sync-args` input — it was silently ignored, so the
      # `stores` extra (ryugraph) never installed and this gate hard-failed on
      # `import ryugraph`. Pass extras to `uv run` directly instead.
      - run: uv run --group dev --extra stores pytest -q tests/integration/test_cypher_subset.py --runslow --no-cov

  schemas:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev
      - run: uv run python scripts/build_draft7.py
      - run: git diff --exit-code src/stargraph/schemas/ir-v1-draft7.json

  serve-test:
    # stargraph-serve + bosun subsystem gate (FR-71, NFR-13, NFR-16). Runs the
    # `serve` marker suite, enforces 0-errors `pyright --strict` over the
    # serve / bosun / triggers / artifacts / nautilus / interrupt source
    # surface, checks `docs/reference/openapi.json` for drift, and smoke-runs
    # the lineage-audit script. Project `requires-python` is `>=3.13,<3.14`,
    # so the matrix is single-version 3.13. Linux-only on every PR keeps
    # CI cost bounded; macOS/Windows coverage flows in via the existing
    # `test` matrix above. `uv sync --all-extras --all-groups` is required
    # because `stargraph.stores._common` pulls in `pyarrow` (extras) and the
    # serve test surface needs the full dev/docs groups.
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.serve == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # CPU-only torch wheel (~200 MB) instead of the full CUDA stack (~3 GB)
      # that sentence-transformers (skills-rag extra) transitively requires.
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v7
      # Composite (not raw setup-uv) so `sync-args` actually runs `uv sync`;
      # otherwise --all-extras is ignored and stores._common/pyarrow is absent.
      - uses: ./.github/actions/uv-setup
        with:
          sync-args: "--all-extras --all-groups"
      - run: uv run pytest -q -m "serve" --tb=short
      # Strict mode comes from ``[tool.pyright] strict = ["src/stargraph", "tests"]``
      # in pyproject.toml. The CLI ``--strict`` flag was removed in pyright;
      # the path globs we pass are already within the configured strict scope,
      # so per-file strictness is preserved by config.
      - run: |
          uv run pyright \
            src/stargraph/serve \
            src/stargraph/bosun \
            src/stargraph/nodes/nautilus \
            src/stargraph/nodes/interrupt \
            src/stargraph/nodes/artifacts \
            src/stargraph/tools/nautilus \
            src/stargraph/artifacts \
            src/stargraph/triggers
      - run: uv run python scripts/regen_openapi.py
      - run: git diff --exit-code docs/reference/openapi.json
      - run: uv run python scripts/lineage_audit.py --help

  # DCO sign-off is enforced by the dcoapp GitHub App (config in .github/dco.yml),
  # not an in-repo job. The app exempts org members and lets contributors fix a
  # missing sign-off with a remediation commit instead of a history rewrite —
  # see CONTRIBUTING.md.

  changelog-check:
    # Enforce CHANGELOG.md entry when IR/schema files change (NFR-2).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: |
          uv run python scripts/check_changelog_touched.py \
            --base-ref ${{ github.event.pull_request.base.sha }} \
            --head-ref ${{ github.event.pull_request.head.sha }}

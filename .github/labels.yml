# Canonical KrakenNet label set. Synced by .github/workflows/label-sync.yml.
# Same file in all three repos so labels stay consistent org-wide.
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers — scoped, no deep codebase knowledge needed"
- name: "help wanted"
  color: "008672"
  description: "Maintainers would welcome a contributor here"
- name: "needs-decision"
  color: "d4c5f9"
  description: "Approach not yet settled — please don't open a PR yet"
- name: "needs-design"
  color: "d4c5f9"
  description: "Design not yet settled — please don't open a PR yet"
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "documentation"
  color: "0075ca"
  description: "Documentation improvements"
- name: "performance"
  color: "fbca04"
  description: "Performance-related"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates"
- name: "ci"
  color: "bfdadc"
  description: "CI / build / release tooling"
- name: "community"
  color: "c2e0c6"

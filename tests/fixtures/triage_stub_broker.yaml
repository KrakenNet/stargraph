#
# Phase-3 task 3.26 fixture: triage IR with the StubBrokerNode form.
#
# Topology (linear):
#
#   source -> retrieve_kv -> broker -> ml_score -> dspy_summary -> clips_route
#       -> approval_gate (interrupt) -> write_record (artifact) -> action
#
# `broker` resolves to ``tests.fixtures.nautilus_stub.StubBrokerNode`` in
# the composition test's node-registry construction (the IR loader
# uses ``kind`` as a free-form key; the test owns the kind->NodeBase
# mapping). The "_no_nautilus" sibling fixture drops the `broker` step
# entirely and edges directly retrieve_kv -> ml_score.
#
# State schema is intentionally compact: the composition test seeds
# `agent_id` + `intent` for the broker step and `record_bytes`
# (artifact payload) before WriteArtifactNode.
ir_version: "1.0.0"
id: "run:triage-stub-broker"
nodes:
  - id: source
    kind: passthrough
  - id: retrieve_kv
    kind: passthrough
  - id: broker
    kind: stub_broker
  - id: ml_score
    kind: passthrough
  - id: dspy_summary
    kind: passthrough
  - id: clips_route
    kind: passthrough
  - id: write_record
    kind: write_artifact
  - id: approval_gate
    kind: interrupt
  - id: action
    kind: passthrough
state_schema:
  agent_id: str
  intent: str
  record_bytes: bytes

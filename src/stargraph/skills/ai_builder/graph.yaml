# SPDX-License-Identifier: Apache-2.0
#
# AI Builder Router IR — classifies user turns and dispatches to one of four
# routes: basic_chat (default), shipwright_gate, inspector_chat, docs_chat.
#
# Conversation model: one long-lived run per conversation (design §4, Option B).
# The run pauses at join_exit via InterruptAction (design §2.4, stargraph/ir/_models.py:119)
# and resumes via POST /v1/runs/{id}/respond on each subsequent user turn.
#
# Phase A: basic_chat is live; shipwright_gate / inspector_chat / docs_chat are stubs.
# Phase B blocker: Shipwright HITL (design §8 Q1).
# Phase C blocker: Inspector + Docs RAG (design §9 Phase C).
#
# IR primitives used (design §2.4):
#   GotoAction     stargraph/ir/_models.py:73   -- exclusive branch dispatch
#   HaltAction     stargraph/ir/_models.py:80   -- timeout / fatal error
#   AssertAction   stargraph/ir/_models.py:104  -- classifier asserts route-classified fact
#   InterruptAction stargraph/ir/_models.py:119 -- HITL pause after each response
#
# Governance: stargraph.bosun.audit (mirrors shipwright stargraph.yaml pattern).
ir_version: "1.1.0"
id: "graph:ai-builder-router"
state_class: "stargraph.skills.ai_builder.state:State"

nodes:
  - id: receive_turn
    kind: "stargraph.skills.ai_builder.nodes.receive:ReceiveTurn"

  - id: classifier
    kind: "stargraph.skills.ai_builder.nodes.classify:Classifier"

  - id: basic_chat
    kind: "stargraph.skills.ai_builder.nodes.basic:BasicChat"

  - id: shipwright_gate
    kind: "stargraph.skills.ai_builder.nodes.shipwright_gate:ShipwrightGate"

  - id: inspector_chat
    kind: "stargraph.skills.ai_builder.nodes.inspector:InspectorChat"

  - id: docs_chat
    kind: "stargraph.skills.ai_builder.nodes.docs:DocsChat"

  - id: join_exit
    kind: "stargraph.skills.ai_builder.nodes.join:JoinExit"

  - id: await_next_turn
    kind: "stargraph.nodes.interrupt"
    config:
      prompt: "Waiting for next user turn."
      on_timeout: "halt"

rules:
  # Entry: initial fact fires, start at receive_turn
  - id: r-start
    when: "(initial-fact)"
    then:
      - kind: goto
        target: receive_turn
    node_id: receive_turn

  - id: r-receive-to-classify
    when: "?n <- (node-id (id receive_turn))"
    then:
      - kind: goto
        target: classifier
    node_id: receive_turn

  # Classifier asserts (route-classified (value "basic"|"shipwright"|...))
  # via AssertAction (stargraph/ir/_models.py:104). Rules below are exclusive
  # branches — exactly one fires per turn (design §2.4, no ParallelAction).

  - id: r-route-basic
    when: >
      ?n <- (node-id (id classifier))
      (route-classified (value "basic"))
    then:
      - kind: goto
        target: basic_chat
    node_id: classifier

  - id: r-route-shipwright
    when: >
      ?n <- (node-id (id classifier))
      (route-classified (value "shipwright"))
    then:
      - kind: goto
        target: shipwright_gate
    node_id: classifier

  - id: r-route-inspector
    when: >
      ?n <- (node-id (id classifier))
      (route-classified (value "inspector"))
    then:
      - kind: goto
        target: inspector_chat
    node_id: classifier

  - id: r-route-docs
    when: >
      ?n <- (node-id (id classifier))
      (route-classified (value "docs"))
    then:
      - kind: goto
        target: docs_chat
    node_id: classifier

  # All four destination nodes converge on join_exit
  - id: r-basic-to-join
    when: "?n <- (node-id (id basic_chat))"
    then:
      - kind: goto
        target: join_exit
    node_id: basic_chat

  - id: r-shipwright-to-join
    when: "?n <- (node-id (id shipwright_gate))"
    then:
      - kind: goto
        target: join_exit
    node_id: shipwright_gate

  - id: r-inspector-to-join
    when: "?n <- (node-id (id inspector_chat))"
    then:
      - kind: goto
        target: join_exit
    node_id: inspector_chat

  - id: r-docs-to-join
    when: "?n <- (node-id (id docs_chat))"
    then:
      - kind: goto
        target: join_exit
    node_id: docs_chat

  # After join, pause for next user turn via InterruptAction (HITL loop).
  # JoinExit node itself fires InterruptAction (design §4, §5.2).
  # Rule advances to await_next_turn node which holds the interrupt.
  - id: r-join-to-await
    when: "?n <- (node-id (id join_exit))"
    then:
      - kind: goto
        target: await_next_turn
    node_id: join_exit

  # On respond, resume at receive_turn with the new turn injected into state.
  - id: r-await-to-receive
    when: "?n <- (node-id (id await_next_turn))"
    then:
      - kind: goto
        target: receive_turn
    node_id: await_next_turn

  # Safety halt: timeout at await_next_turn (config on_timeout=halt covers
  # the node level; this rule handles any unmatched terminal state).
  - id: r-timeout-halt
    when: "(await-timeout)"
    then:
      - kind: halt
        reason: "ai-builder-router: conversation timed out awaiting next turn"

governance:
  - id: stargraph.bosun.audit

checkpoints:
  every: node-exit
  store: "sqlite:./.ai_builder/checkpoints.db"

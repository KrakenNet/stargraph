# SPDX-License-Identifier: Apache-2.0
#
# Shipwright IR — canonical agent-graph that authors Stargraph graphs from a brief.
#
# Drives the Plan-1 foundation pipeline end-to-end via ``stargraph run``:
#
#     triage_gate
#         |
#         v
#     parse_brief        (DSPy LLM call #1: brief → typed slots)
#         |
#         v
#     gap_check          (Bosun rules: required-slot questions)
#         |
#         v
#     propose_questions  (DSPy LLM call #2: edge-case questions)
#         |
#         v
#     synthesize_graph   (DSPy LLM call #3: render templates → artifact_files)
#         |
#         v
#     verify_static      (syntax + ruff + stargraph graph verify)
#         |
#         v
#     verify_tests       (pytest in synth tmpdir)
#         |
#         v
#     verify_smoke       (stargraph simulate against IR)
#         |
#         v
#     fix_loop           (decide land vs retry; halts on land)
#
# Plan-1.5 limitation: this graph runs end-to-end but does NOT pause for HITL.
# Required slots that gap_check flags will simply propagate; downstream nodes
# operate on whatever ParseBrief filled. Live HITL via ``InterruptAction`` is
# Plan 3 territory; for interactive runs, use ``scripts/shipwright_run.py``.
#
# Run:
#   stargraph run src/stargraph/skills/shipwright/graph.yaml \
#     --lm-url $LLM_OLLAMA_URL --lm-model gpt-oss:20b \
#     --inputs brief="an ETL graph that ..."
ir_version: "1.0.0"
id: "graph:shipwright"
state_class: "stargraph.skills.shipwright.state:State"
nodes:
  - id: triage_gate
    kind: "stargraph.skills.shipwright.nodes.triage:TriageGate"
  - id: parse_brief
    kind: "stargraph.skills.shipwright.nodes.parse:ParseBrief"
  - id: gap_check
    kind: "stargraph.skills.shipwright.nodes.interview:GapCheck"
  - id: propose_questions
    kind: "stargraph.skills.shipwright.nodes.interview:ProposeQuestions"
  - id: synthesize_graph
    kind: "stargraph.skills.shipwright.nodes.synthesize:SynthesizeGraph"
  - id: verify_static
    kind: "stargraph.skills.shipwright.nodes.verify:VerifyStatic"
  - id: verify_tests
    kind: "stargraph.skills.shipwright.nodes.verify:VerifyTests"
  - id: verify_smoke
    kind: "stargraph.skills.shipwright.nodes.verify:VerifySmoke"
  - id: fix_loop
    kind: "stargraph.skills.shipwright.nodes.fix:FixLoop"
rules:
  - id: r-advance-to-parse
    when: "(initial-fact)"
    then:
      - kind: goto
        target: parse_brief
  - id: r-parse-to-gap-check
    when: "?n <- (node-id (id parse_brief))"
    then:
      - kind: goto
        target: gap_check
  - id: r-gap-check-to-propose
    when: "?n <- (node-id (id gap_check))"
    then:
      - kind: goto
        target: propose_questions
  - id: r-propose-to-synth
    when: "?n <- (node-id (id propose_questions))"
    then:
      - kind: goto
        target: synthesize_graph
  - id: r-synth-to-verify-static
    when: "?n <- (node-id (id synthesize_graph))"
    then:
      - kind: goto
        target: verify_static
  - id: r-verify-static-to-tests
    when: "?n <- (node-id (id verify_static))"
    then:
      - kind: goto
        target: verify_tests
  - id: r-verify-tests-to-smoke
    when: "?n <- (node-id (id verify_tests))"
    then:
      - kind: goto
        target: verify_smoke
  - id: r-verify-smoke-to-fix
    when: "?n <- (node-id (id verify_smoke))"
    then:
      - kind: goto
        target: fix_loop
  - id: r-fix-to-halt
    when: "?n <- (node-id (id fix_loop))"
    then:
      - kind: halt
        reason: "shipwright reached fix_loop"

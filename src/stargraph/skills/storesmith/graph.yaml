# SPDX-License-Identifier: Apache-2.0
#
# Storesmith IR — a Stargraph graph that builds Stargraph stores from a brief.
#
# Linear pipeline (routes on the static IR edge; no rule engine required, so it
# runs under plain `stargraph run`):
#
#   triage   (reject empty briefs)
#     -> recall   (load reflexion lessons + RAG grounding relevant to the brief)
#       -> build  (bounded generate -> gate{static,contract,tests} -> repair loop;
#                  the verify gate is the "always works" contract)
#         -> record  (success: log (spec -> store) trainset pair + land files;
#                     failure: log a summary lesson) -> halt
#
# Run (model is selectable):
#   stargraph run src/stargraph/skills/storesmith/graph.yaml \
#     --lm-url "$LLM_OLLAMA_URL" --lm-model laguna-xs \
#     -i brief="a sqlite DocStore that round-trips text + metadata" \
#     -i model_id=laguna-xs -i output_dir=./generated_stores
ir_version: "1.0.0"
id: "graph:storesmith"
state_class: "stargraph.skills.storesmith.state:State"
nodes:
  - id: triage
    kind: "stargraph.skills.storesmith.nodes.triage:TriageGate"
  - id: recall
    kind: "stargraph.skills.storesmith.nodes.recall:Recall"
  - id: build
    kind: "stargraph.skills.storesmith.nodes.build:Build"
  - id: record
    kind: "stargraph.skills.storesmith.nodes.record:RecordBuild"
rules: []

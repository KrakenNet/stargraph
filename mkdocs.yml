      - Author a Bosun pack: how-to/bosun-pack.md
      - Persist with checkpointer: how-to/checkpointer.md
      - Add a rule pack: how-to/add-rule-pack.md
      - Add a store provider: how-to/add-store-provider.md
      - Add a trigger: how-to/add-trigger.md
      - Add an MCP server: how-to/add-mcp-server.md
      - Add a Nautilus source: how-to/add-nautilus-source.md
      - Air-gap deployment (operator playbook): guides/air-gap-deployment.md

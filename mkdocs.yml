site_name: Stargraph
site_description: Stateful agent-graph framework with deterministic governance
site_url: https://krakennet.github.io/stargraph
repo_url: https://github.com/KrakenNet/stargraph
repo_name: KrakenNet/stargraph

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/brightness-4, name: Switch to light mode }
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

extra:
  version: { provider: mike, default: latest, alias: true }

# AGENTS.md files are agent work-contracts (DOX), not site pages. graphify-out/
# is gitignored tooling output that may appear under docs/ locally.
exclude_docs: |
  AGENTS.md
  graphify-out/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture map: architecture-map.md
  - Tutorials:
      - Overview: tutorials/index.md
      - First graph: tutorials/first-graph.md
      - Add a Fathom rule pack: tutorials/fathom-rules.md
      - Agent with retrieval: tutorials/agent-with-retrieval.md
      - HITL graph: tutorials/hitl-graph.md
      - ML node graph: tutorials/ml-node-graph.md
      - Serve and replay: tutorials/serve-and-replay.md
  - How-to Guides:

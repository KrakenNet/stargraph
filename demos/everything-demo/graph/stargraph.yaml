# SPDX-License-Identifier: Apache-2.0
#
# everything-demo — ultra-complex test workflow.
#
# Goal: exercise one of every Stargraph capability in a single graph so
# every node kind, action variant, store kind, trigger, governance
# pack, capability gate, replay-policy class, and provenance edge can
# be smoke-tested end-to-end.
#
# Domain: support-ticket triage and remediation.
#
#   webhook ──┐
#   cron    ──┼──► graph:everything-demo
#   manual  ──┘
#
# Pipeline (linearized for the diagram; routing rules below allow
# branching, retry, fan-out and HITL gating):
#
#   intake (echo)
#     └─► extract_intent (dspy)
#           └─► search_kb (retrieval, fan-out vector+graph+doc → RRF)
#                 └─► risk_score (ml, sklearn classifier)
#                       └─► lookup_history (custom NodeBase wrapping @tool)
#                             └─► broker_compliance_check (broker, retry-able)
#                                   └─► [parallel: enrichment subgraph + memory_write]
#                                         └─► assert compliance fact
#                                               └─► hitl_review (interrupt, durable)
#                                                     └─► branch_response (custom)
#                                                           ├─[approve]─► retract draft fact
#                                                           │              └─► notify_user (mcp tool)
#                                                           │                    └─► summarize_resolution (dspy)
#                                                           │                          └─► write_artifact
#                                                           │                                └─► complete (echo, halt)
#                                                           └─[reject ]─► halt
#
# Node-kind dictionary in this graph:
#   echo            — sentinel marker (start/terminal)
#   passthrough     — dispatch helper, no external side-effect
#   dspy            — DSPyNode (force-loud adapter via stargraph.adapters.dspy)
#   ml              — MLNode (sklearn / xgboost / onnx; here sklearn)
#   retrieval       — RetrievalNode (parallel fan-out, RRF rerank)
#   tool            — typed @tool call (lookup_history / notify_user)
#   broker          — BrokerNode → Nautilus (Policy enforced data brokering)
#   memory_write    — MemoryWriteNode (Episode → SQLiteMemoryStore)
#   write_artifact  — WriteArtifactNode → ArtifactStore
#   interrupt       — InterruptNode (durable HITL wait, timeout=null)
#   subgraph        — SubGraphNode (mounts subgraphs/enrichment.yaml)
#   module:Class    — custom NodeBase via importlib (StartSentinel, BranchResponse, LookupHistoryCaller)

ir_version: "1.0.0"
id: "graph:everything-demo"

# ---------------------------------------------------------------------------
# State schema — see ./state.py:RunState for the Pydantic model.
# ---------------------------------------------------------------------------
state_class: "demos.everything_demo.graph.state:RunState"

# ---------------------------------------------------------------------------
# Nodes — at least one of every node kind Stargraph core ships.
# ---------------------------------------------------------------------------
nodes:
  # Phase 1: intake
  - id: intake
    kind: "demos.everything_demo.graph.nodes:StartSentinel"
  - id: extract_intent
    kind: dspy
  - id: search_kb
    kind: retrieval
  - id: risk_score
    kind: ml
  - id: lookup_history
    kind: "demos.everything_demo.graph.nodes:LookupHistoryCaller"

  # Phase 2: external lookup + enrichment fan-out
  - id: broker_compliance_check
    kind: broker
  - id: post_broker_dispatch
    kind: passthrough
  - id: enrichment
    kind: subgraph              # mounts subgraphs/enrichment.yaml
  - id: write_episode
    kind: memory_write
  - id: post_enrichment_join
    kind: passthrough

  # Phase 3: HITL
  - id: hitl_review
    kind: interrupt
  - id: branch_response
    kind: "demos.everything_demo.graph.nodes:BranchResponse"

  # Phase 4: terminal — approve path writes everything, rejects halt early
  - id: notify_user_call
    kind: tool                  # routes through stargraph.adapters.mcp when configured
  - id: summarize_resolution
    kind: dspy
  - id: persist_report
    kind: write_artifact
  - id: complete
    kind: echo

  - id: rejected
    kind: echo

# ---------------------------------------------------------------------------
# Tools — registered via the stargraph.tools entry-point group; see tools.py.
# ---------------------------------------------------------------------------
tools:
  - id: demo.lookup_history@1.0.0
  - id: demo.notify_user@1.0.0

# ---------------------------------------------------------------------------
# Skills — one ReactSkill-shaped agent skill bundled in skills/.
# ---------------------------------------------------------------------------
skills:
  - id: demo.triage@1.0.0

# ---------------------------------------------------------------------------
# Governance — 4 stock Bosun packs + 2 custom (routing + safety).
# ---------------------------------------------------------------------------
governance:
  - id: stargraph.bosun.budgets
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }
  - id: stargraph.bosun.audit
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }
  - id: stargraph.bosun.safety_pii
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }
  - id: stargraph.bosun.retries
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }
  - id: demo.routing
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }
  - id: demo.safety
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }

# ---------------------------------------------------------------------------
# Stores — one of every Protocol kind.
#   vector  → LanceDB    (RetrievalNode + the demo.triage skill embeddings)
#   graph   → RyuGraph   (Asset/KB knowledge graph)
#   doc     → SQLiteDoc  (ticket archive)
#   memory  → SQLiteMem  (per-(user,session,agent) episodic memory)
#   fact    → SQLiteFact (compliance facts pinned by routing rules)
# ---------------------------------------------------------------------------
stores:
  vector: lancedb:./.lance
  graph: ryugraph:./.ryu
  doc: sqlite:./.docs
  memory: sqlite:./.memory
  fact: sqlite:./.facts

# Embedding + reranker selection used by RetrievalNode + the demo.triage skill.
embedding:
  id: stargraph.embeddings.minilm
  version: "1.0"
reranker:
  id: stargraph.rerankers.rrf
  version: "1.0"

# ---------------------------------------------------------------------------
# Checkpointer — every node-exit, sqlite-backed; required for replay.
# ---------------------------------------------------------------------------
checkpoints:
  every: node-exit
  store: sqlite:./.checkpoints

# ---------------------------------------------------------------------------
# Capability declarations — engine-side default-deny in cleared profiles.
# ---------------------------------------------------------------------------
capabilities:
  required:
    - "tools:lookup_history"
    - "tools:notify_user"
    - "tools:broker_request"
    - "runs:respond"
    - "db.kb_vector:read"
    - "db.kb_graph:read"
    - "db.kb_doc:read"
    - "db.episodes:write"
    - "db.facts:write"
    - "artifacts:write"

# ---------------------------------------------------------------------------
# Triggers — manifests live in ./triggers.yaml; this references them.
# ---------------------------------------------------------------------------
triggers:
  manual:
    - id: manual.replay
  cron:
    - id: cron.daily_digest
  webhook:
    - id: webhook.support_intake

# ---------------------------------------------------------------------------
# Rules — exercises every Action variant: goto / halt / parallel / retry /
# assert / retract / interrupt.
# ---------------------------------------------------------------------------
rules:
  # -- Phase 1 chain -------------------------------------------------------
  - id: r-intake-to-extract
    when: "?n <- (node-id (id intake))"
    then: [{ kind: goto, target: extract_intent }]

  - id: r-extract-to-search
    when: "?n <- (node-id (id extract_intent))"
    then: [{ kind: goto, target: search_kb }]

  - id: r-search-to-risk
    when: "?n <- (node-id (id search_kb))"
    then: [{ kind: goto, target: risk_score }]

  - id: r-risk-to-history
    when: "?n <- (node-id (id risk_score))"
    then: [{ kind: goto, target: lookup_history }]

  # -- Phase 2: broker w/ retry on transient ------------------------------
  - id: r-history-to-broker
    when: "?n <- (node-id (id lookup_history))"
    then: [{ kind: goto, target: broker_compliance_check }]

  - id: r-broker-retry-transient
    when: "?n <- (node-id (id broker_compliance_check)) (state (compliance_status pending)) (state (broker_attempt < 3))"
    then:
      - kind: retry
        target: broker_compliance_check
        backoff_ms: 750

  - id: r-broker-clean-fanout
    when: "?n <- (node-id (id broker_compliance_check)) (state (compliance_status clean | flagged))"
    then: [{ kind: goto, target: post_broker_dispatch }]

  # parallel fan-out: subgraph enrichment AND memory_write run concurrently,
  # join at post_enrichment_join.
  - id: r-post-broker-fanout
    when: "?n <- (node-id (id post_broker_dispatch))"
    then:
      - kind: parallel
        targets: [enrichment, write_episode]
        join: post_enrichment_join
        strategy: all

  # assert action: pin compliance fact once both branches finish.
  - id: r-join-pin-compliance-fact
    when: "?n <- (node-id (id post_enrichment_join)) (state (fact_pinned false))"
    then:
      - kind: assert
        fact: "compliance_check_complete"
        slots: '{"ticket_id": "{ticket_id}", "status": "{compliance_status}"}'
      - kind: goto
        target: hitl_review

  # -- Phase 3: HITL gate (durable, no timeout) ---------------------------
  - id: r-hitl-gate
    when: "?n <- (node-id (id hitl_review))"
    then:
      - kind: interrupt
        prompt: "Approve resolution for ticket {ticket_id} (risk={risk_class})?"
        interrupt_payload:
          requested_capability: "runs:respond"
        requested_capability: "runs:respond"
        timeout: null
        on_timeout: "noop"

  - id: r-hitl-to-branch
    when: "?n <- (node-id (id hitl_review))"
    then: [{ kind: goto, target: branch_response }]

  # -- Phase 4: branch on response decision --------------------------------
  # approve path: retract any stale draft fact, notify, summarize, persist
  - id: r-branch-approve-retract
    when: "?n <- (node-id (id branch_response)) (state (validation_passed true))"
    then:
      - kind: retract
        pattern: "(fact (kind draft_resolution))"
      - kind: goto
        target: notify_user_call

  - id: r-notify-to-summarize
    when: "?n <- (node-id (id notify_user_call))"
    then: [{ kind: goto, target: summarize_resolution }]

  - id: r-summarize-to-persist
    when: "?n <- (node-id (id summarize_resolution))"
    then: [{ kind: goto, target: persist_report }]

  - id: r-persist-to-complete
    when: "?n <- (node-id (id persist_report))"
    then: [{ kind: goto, target: complete }]

  - id: r-complete-halt
    when: "?n <- (node-id (id complete))"
    then: [{ kind: halt, reason: "everything-demo: approved path complete" }]

  # reject / escalate path: short-circuit halt
  - id: r-branch-reject-halt
    when: "?n <- (node-id (id branch_response)) (state (validation_passed false))"
    then:
      - kind: goto
        target: rejected

  - id: r-rejected-halt
    when: "?n <- (node-id (id rejected))"
    then: [{ kind: halt, reason: "everything-demo: rejected at HITL" }]

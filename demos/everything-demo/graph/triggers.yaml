# SPDX-License-Identifier: Apache-2.0
#
# everything-demo trigger specs.
#
# Loaded by `stargraph serve` from <stargraph-config>/triggers.yaml. Three
# trigger plugins ship with Stargraph core: manual, cron, webhook. This
# file declares one of each, all targeting the same graph
# (``graph:everything-demo``).
#
# Manual trigger has no on-disk spec — it is the CLI/HTTP convergence
# path (POST /v1/runs and `stargraph run`); declared here only as
# documentation that it is wired.

version: "1.0"

manual:
  - id: manual.replay
    graph_id: graph:everything-demo
    description: "Operator-driven re-run for replay/repair work."

cron:
  - id: cron.daily_digest
    graph_id: graph:everything-demo
    expr: "0 9 * * *"        # 09:00 daily
    tz: "America/New_York"
    missed_fire_policy: "fire_once_catchup"
    params:
      trigger_kind: "cron"
      ticket_id: "DIGEST-{{iso_fire}}"
      ticket_text: "daily aggregation digest"
      ticket_source: "api"

webhook:
  - id: webhook.support_intake
    graph_id: graph:everything-demo
    path: "/triggers/support"
    timestamp_window_seconds: 300
    nonce_lru_size: 10000
    current_secret_env: "STARGRAPH_WEBHOOK_SECRET_CURRENT"
    previous_secret_env: "STARGRAPH_WEBHOOK_SECRET_PREVIOUS"
    params_extractor: "json"   # default — body parsed as JSON, becomes run params

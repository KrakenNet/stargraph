<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>cve-rem · run watcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
<style>
  :root {
    /* surface scale */
    --bg-0: #0a0b0d;        /* page bg */
    --bg-1: #101216;        /* graph panel */
    --bg-2: #15181d;        /* main view */
    --bg-3: #1b1f25;        /* card */
    --bg-3h:#22272f;        /* card hover */
    --bg-4: #2a3038;
    --line-1: rgba(255,255,255,.04);
    --line-2: rgba(255,255,255,.08);
    --line-3: rgba(255,255,255,.14);

    /* text */
    --fg-0: #f1f3f7;        /* primary */
    --fg-1: #c8cdd5;        /* body */
    --fg-2: #8a92a0;        /* secondary */
    --fg-3: #5c6371;        /* tertiary */
    --mute: var(--fg-2);
    --mute-2: #3a4049;
    --mute-3: #2a2f37;

    /* status */
    --ok:        #5fcf90;
    --ok-ring:   rgba(95,207,144,.28);
    --run:       var(--accent, #3ddc97);
    --run-ring:  var(--accent-ring, rgba(61,220,151,.4));
    --warn:      #f5b54a;
    --err:       #ef6a6a;
    --info:      #7ab6ff;

    /* edges */
    --edge:        rgba(255,255,255,.10);
    --edge-bright: rgba(255,255,255,.20);

    /* accent (overridden inline) */
    --accent:     #3ddc97;
    --accent-dim: rgba(61,220,151,.14);
    --accent-ring:rgba(61,220,151,.4);

    /* type */
    --sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

    /* density */
    --rad: 8px;
    --pad: 16px;
    --gap: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-0); color: var(--fg-1); font-family: var(--sans); font-size: 13px; line-height: 1.45; }
  body { overflow: hidden; }
  button { font: inherit; cursor: default; }
  .mono { font-family: var(--mono); font-variant-ligatures: none; }
  .muted { color: var(--fg-2); }

  /* ─── App shell ───────────────────────────────────────────────────────── */

  .app {
    display: grid;
    grid-template-rows: 52px 1fr 48px;
    height: 100vh;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(61,220,151,.04), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(122,182,255,.03), transparent 60%),
      var(--bg-0);
  }
  .app[data-density="compact"] { --pad: 12px; --gap: 8px; font-size: 12px; }
  .app[data-density="comfy"]   { --pad: 20px; --gap: 16px; font-size: 13.5px; }

  .main {
    display: grid;
    grid-template-columns: 540px 1fr;
    min-height: 0;
    overflow: hidden;
    border-top: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
  }
  .main[data-side="right"] { grid-template-columns: 1fr 540px; }
  .main[data-side="right"] .graph-panel { order: 2; border-left: 1px solid var(--line-2); border-right: none; }
  .main[data-side="right"] .view { order: 1; }

  /* ─── Top bar ─────────────────────────────────────────────────────────── */

  .topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    background: linear-gradient(180deg, #0e1015 0%, var(--bg-0) 100%);
    color: var(--fg-0);
  }
  .topbar-l { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .topbar-c { display: flex; align-items: center; justify-content: center; }
  .topbar-r { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }

  .brand { display: inline-flex; align-items: baseline; gap: 6px; }
  .brand-mark {
    color: var(--accent);
    font-size: 14px;
    transform: translateY(1px);
    margin-right: 2px;
    animation: brandSpin 4s linear infinite;
    display: inline-block;
  }
  @keyframes brandSpin { to { transform: rotate(360deg) translateY(1px); } }
  .brand-name { font-weight: 700; letter-spacing: -.01em; color: var(--fg-0); }
  .brand-sub { color: var(--fg-3); font-size: 11.5px; letter-spacing: .02em; }
  .bread { font-size: 11.5px; color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .current-node {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 6px 14px 6px 12px;
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    border-radius: 999px;
    font-size: 12px;
  }
  .current-label { color: var(--fg-3); text-transform: uppercase; font-size: 10px; letter-spacing: .12em; }
  .current-name { font-family: var(--mono); color: var(--fg-0); font-weight: 600; }
  .current-bar { display: inline-block; width: 84px; height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
  .current-bar-fill { display: block; height: 100%; background: var(--accent); transition: width .2s linear; }
  .current-time { color: var(--fg-2); font-size: 11px; }

  .ghost-btn {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--fg-1);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11.5px;
  }
  .ghost-btn:hover { background: var(--bg-3); color: var(--fg-0); border-color: var(--line-3); }
  .primary-btn {
    background: var(--err);
    border: 1px solid transparent;
    color: #fff;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 11.5px;
    font-weight: 500;
  }
  .primary-btn:hover { filter: brightness(1.08); }

  /* ─── Graph panel ─────────────────────────────────────────────────────── */

  .graph-panel {
    background: var(--bg-1);
    border-right: 1px solid var(--line-2);
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
    color: var(--fg-1);
  }
  .gp-head { padding: 14px 16px 12px; border-bottom: 1px solid var(--line-1); display: flex; flex-direction: column; gap: 8px; min-width: 0; overflow: hidden; }
  .gp-head-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .gp-title { display: inline-flex; align-items: center; gap: 8px; }
  .gp-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .gp-name { font-family: var(--mono); font-weight: 600; color: var(--fg-0); font-size: 13px; }
  .gp-runid { font-family: var(--mono); font-size: 10.5px; color: var(--fg-3); }
  .gp-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--fg-2); flex-wrap: wrap; }
  .gp-sep { color: var(--fg-3); }
  .gp-live { color: var(--accent); display: inline-flex; align-items: center; gap: 6px; font-size: 11px; }
  .gp-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); animation: pulse 1.6s ease-in-out infinite; }

  /* mini-map strip */
  .gp-mini {
    display: flex;
    gap: 1px;
    height: 14px;
    margin-top: 4px;
    width: 100%;
    min-width: 0;
    overflow: hidden;
  }
  .gp-mini-seg {
    position: relative;
    border: 0;
    background: rgba(255,255,255,.05);
    border-radius: 2px;
    padding: 0;
    overflow: hidden;
    cursor: default;
    min-width: 0;
    flex: 1 1 0;
  }
  .gp-mini-seg.is-running { background: var(--accent); }
  .gp-mini-seg.is-done    { background: rgba(95,207,144,.45); }
  .gp-mini-seg.is-skipped { background: rgba(255,255,255,.04); border: 1px dashed var(--mute-2); }
  .gp-mini-seg.is-selected { outline: 1px solid var(--fg-0); outline-offset: 1px; }
  .gp-mini-seg:hover { filter: brightness(1.2); }
  .gp-mini-seg.is-pending:hover { background: rgba(255,255,255,.10); }

  .gp-scroll { overflow-y: auto; overflow-x: hidden; padding: 14px 14px 18px; }
  .gp-rows { display: flex; flex-direction: column; gap: 0; }

  /* ─── Step card (.sc-*) ───────────────────────────────────────────────── */

  .sc-wrap {
    display: grid;
    grid-template-columns: 24px minmax(0, 1fr);
    gap: 0;
    min-height: 0;
  }
  .sc-rail {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 14px;
  }
  .sc-rail-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--bg-1);
    border: 2px solid var(--mute-2);
    position: relative;
    z-index: 2;
    flex: none;
  }
  .sc-rail-dot.is-running { border-color: var(--accent); background: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
  .sc-rail-dot.is-done    { border-color: var(--ok); background: var(--ok); }
  .sc-rail-dot.is-skipped { border-style: dashed; }
  .sc-rail-pulse {
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    animation: rail-pulse 1.6s ease-out infinite;
  }
  @keyframes rail-pulse {
    0% { transform: scale(0.8); opacity: 0.9; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  .sc-rail-line {
    flex: 1;
    width: 1.5px;
    background: var(--mute-2);
    margin-top: 2px;
    min-height: 14px;
  }
  .sc-rail-line.is-done { background: var(--ok); }
  .sc-rail-line.is-running { background: linear-gradient(180deg, var(--accent), var(--mute-2)); }
  .sc-wrap.is-last .sc-rail-line { display: none; }

  .sc-card {
    text-align: left;
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    border-radius: 8px;
    padding: 10px 12px;
    margin: 6px 0 14px 6px;
    display: flex; flex-direction: column; gap: 6px;
    width: calc(100% - 6px);
    min-width: 0;
    color: var(--fg-1);
    cursor: default;
    position: relative;
    transition: border-color .12s, background .12s;
  }
  .sc-card:hover { border-color: var(--line-3); background: var(--bg-3h); }
  .sc-card.is-selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-ring); }
  .sc-card.is-running { border-color: var(--accent); background: linear-gradient(180deg, color-mix(in oklab, var(--bg-3) 88%, var(--accent) 12%), var(--bg-3)); }
  .sc-card.is-skipped { opacity: .55; }
  .sc-card.is-pending { background: var(--bg-2); }
  .sc-card.is-sentinel {
    background: transparent;
    border-style: dashed;
    padding: 8px 12px;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }

  .sc-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .sc-top-l { display: inline-flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
  .sc-step {
    font-size: 10.5px;
    color: var(--fg-3);
    background: rgba(255,255,255,.04);
    border-radius: 3px;
    padding: 1px 5px;
    flex: none;
    letter-spacing: .04em;
  }
  .sc-card.is-running .sc-step { color: var(--accent); background: var(--accent-dim); }
  .sc-card.is-done .sc-step { color: var(--ok); background: rgba(95,207,144,.10); }
  .sc-glyph {
    flex: none;
    width: 22px; height: 22px;
    border-radius: 5px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--line-2);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--fg-1);
  }
  .sc-glyph.is-running { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .sc-glyph.is-done    { background: rgba(95,207,144,.12); border-color: rgba(95,207,144,.4); color: var(--ok); }
  .sc-glyph.is-skipped { color: var(--fg-3); }
  .sc-name {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--fg-0);
    font-size: 12.5px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sc-card.is-pending .sc-name { color: var(--fg-1); }

  .sc-status {
    flex: none;
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px;
    color: var(--fg-2);
    text-transform: uppercase;
    letter-spacing: .05em;
    font-weight: 500;
  }
  .sc-status.is-running { color: var(--accent); }
  .sc-status.is-done    { color: var(--ok); }
  .sc-status.is-skipped { color: var(--fg-3); }
  .sc-status-t { font-family: var(--mono); }
  .sc-ok { color: var(--ok); }
  .sc-skip { color: var(--fg-3); }
  .sc-pend { color: var(--fg-3); font-size: 10px; }

  .gp-spin {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; border: 1.5px solid var(--accent-dim);
    border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sc-type {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--fg-3);
  }
  .sc-type-row {
    display: inline-flex; align-items: baseline; gap: 6px;
    flex-wrap: wrap;
    font-size: 10px;
  }
  .sc-type-row .sc-sep { color: var(--mute-3); }
  .sc-actor {
    color: var(--fg-2);
    text-transform: lowercase;
    letter-spacing: .02em;
    font-size: 10.5px;
  }
  .sc-op {
    font-size: 11px;
    color: var(--fg-1);
    background: rgba(255,255,255,.025);
    border: 1px solid var(--line-1);
    border-radius: 4px;
    padding: 3px 6px;
    align-self: flex-start;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sc-card.is-running .sc-op { color: var(--accent); border-color: rgba(61,220,151,.25); background: rgba(61,220,151,.06); }
  .sc-desc {
    font-size: 11.5px;
    color: var(--fg-2);
    line-height: 1.4;
    min-width: 0;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  /* live current-action line */
  .sc-current {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 4px;
    font-size: 11px;
    overflow: hidden;
    min-width: 0;
    max-width: 100%;
  }
  .sc-current-dot {
    flex: none;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-ring);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .sc-current-verb {
    color: var(--accent);
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: .08em;
    font-weight: 600;
  }
  .sc-current-target {
    color: var(--fg-0);
    font-size: 11px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* iterations strip */
  .sc-iters {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px;
  }
  .sc-iters-label {
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .sc-iters-row { display: inline-flex; gap: 4px; }
  .sc-iter {
    width: 18px; height: 18px;
    border-radius: 3px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--line-2);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9.5px;
    color: var(--fg-3);
    cursor: default;
  }
  .sc-iter-n { font-weight: 600; }
  .sc-iter.is-done    { background: rgba(95,207,144,.18); border-color: rgba(95,207,144,.4); color: var(--ok); }
  .sc-iter.is-running { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); animation: iter-pulse 1.6s ease-in-out infinite; }
  .sc-iter.is-pending { color: var(--fg-3); }
  @keyframes iter-pulse { 50% { box-shadow: 0 0 0 3px var(--accent-ring); } }

  /* highlights — bulleted result list */
  .sc-hl {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex; flex-direction: column;
    gap: 3px;
  }
  .sc-hl li {
    display: grid;
    grid-template-columns: 14px minmax(0, 1fr);
    gap: 4px;
    font-size: 11.5px;
    color: var(--fg-1);
    line-height: 1.4;
    min-width: 0;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  .sc-hl li > span { min-width: 0; overflow-wrap: anywhere; word-break: break-word; }
  .sc-hl-bullet {
    color: var(--accent);
    font-family: var(--mono);
    font-weight: 700;
  }
  .sc-card.is-pending .sc-hl-bullet { color: var(--fg-3); }
  .sc-card.is-skipped .sc-hl-bullet { color: var(--fg-3); }

  .sc-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 16px;
    padding-top: 2px;
    min-width: 0;
    max-width: 100%;
  }
  .sc-stat { display: inline-flex; align-items: baseline; gap: 5px; }
  .sc-stat-v { color: var(--fg-0); font-size: 12px; font-weight: 600; }
  .sc-stat-k { color: var(--fg-3); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }

  .sc-foot {
    display: flex; align-items: center; gap: 10px;
    padding-top: 2px;
    border-top: 1px solid var(--line-1);
    margin-top: 4px;
    padding-top: 8px;
  }
  .sc-card.is-pending .sc-foot { border-top-color: transparent; padding-top: 0; }
  .sc-progress {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,.04);
    border-radius: 2px;
    overflow: hidden;
  }
  .sc-progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width .2s linear;
  }
  .sc-foot-t { font-size: 10.5px; color: var(--fg-2); }
  .sc-foot-time { color: var(--fg-2); }
  .sc-foot-dur { margin-left: auto; color: var(--fg-3); }

  .sc-loop {
    position: absolute;
    top: 10px;
    right: 76px;
    font-size: 10px;
    color: var(--fg-3);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .sc-loop-arrow {
    display: inline-block;
    color: var(--warn);
    animation: spin 6s linear infinite;
  }

  .sc-sentinel { color: var(--fg-2); font-size: 11px; }

  /* compact (used inside branch row) */
  .sc-wrap.is-compact .sc-card { padding: 8px 10px; gap: 4px; }
  .sc-wrap.is-compact .sc-stats { gap: 8px 12px; }
  .sc-wrap.is-compact .sc-desc { display: none; }

  /* branches row */
  .gp-branches {
    display: grid;
    grid-template-columns: 24px minmax(0, 1fr);
    margin-top: -6px;
  }
  .gp-branches > .gp-fork {
    grid-column: 2;
    width: 100%;
    height: 28px;
    margin-left: 6px;
  }
  .gp-branches-row {
    grid-column: 2;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 10px;
    margin-left: 6px;
  }
  .gp-branches-row > * { min-width: 0; }
  .gp-branches-row .sc-wrap { grid-template-columns: minmax(0, 1fr); min-width: 0; }
  .gp-branches-row .sc-wrap .sc-rail { display: none; }
  .gp-branches-row .sc-wrap .sc-card { margin: 0; width: 100%; min-width: 0; }

  .gp-foot { padding: 10px 16px; border-top: 1px solid var(--line-1); }
  .legend { display: flex; flex-wrap: wrap; gap: 12px 14px; font-size: 11px; color: var(--fg-2); }
  .lg { display: inline-flex; align-items: center; gap: 6px; }
  .lg-dot { width: 7px; height: 7px; border-radius: 50%; }
  .lg-done { background: var(--ok); }
  .lg-run  { background: var(--accent); box-shadow: 0 0 0 2px var(--accent-ring); }
  .lg-pend { background: var(--mute-2); }
  .lg-skip { background: transparent; border: 1px dashed var(--mute-2); }

  /* ─── View (right of graph) ───────────────────────────────────────────── */

  .view {
    background: var(--bg-2);
    overflow: auto;
    padding: var(--pad);
    display: flex; flex-direction: column;
    gap: var(--gap);
    min-height: 0;
  }

  .nv-head {
    display: flex; flex-direction: column; gap: 6px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line-1);
  }
  .nv-head-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .nv-eyebrow { display: inline-flex; gap: 8px; align-items: center; font-size: 11px; color: var(--fg-3); font-family: var(--mono); text-transform: lowercase; letter-spacing: .02em; }
  .nv-type { color: var(--fg-2); }
  .nv-sep { color: var(--fg-3); }
  .nv-id { color: var(--fg-3); }
  .nv-title { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -.015em; color: var(--fg-0); font-family: var(--mono); }

  .nv-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px 3px 9px;
    border-radius: 999px;
    font-size: 11px; font-weight: 500;
    border: 1px solid var(--line-2);
  }
  .nv-pill.is-running { color: var(--accent); background: var(--accent-dim); border-color: var(--accent); }
  .nv-pill.is-done    { color: var(--ok); background: rgba(95,207,144,.10); border-color: rgba(95,207,144,.4); }
  .nv-pill.is-pending { color: var(--fg-2); }
  .nv-pill.is-skipped { color: var(--fg-3); border-style: dashed; }
  .nv-pill-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); animation: pulse 1.4s ease-in-out infinite; }

  /* ─── Panels (the cards in the view) ──────────────────────────────────── */

  .panel {
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    border-radius: var(--rad);
    display: flex; flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel-h {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line-1);
    background: rgba(255,255,255,.012);
  }
  .panel-t { color: var(--fg-2); font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; font-weight: 600; display: inline-flex; gap: 6px; align-items: center; }
  .panel-r { color: var(--fg-3); font-size: 11px; }
  .panel-b { padding: 12px; min-height: 0; }
  .panel-b.is-scroll { overflow: auto; }
  .panel-b.is-mono { padding: 0; }

  /* keyvalue list */
  .kv { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 6px 14px; font-size: 11.5px; }
  .kv dt { color: var(--fg-3); text-transform: lowercase; }
  .kv dd { margin: 0; color: var(--fg-0); }
  .kv dd.mono { font-family: var(--mono); }

  /* code blocks */
  .code {
    margin: 0;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    color: var(--fg-0);
    background: transparent;
    overflow: auto;
    white-space: pre;
    tab-size: 2;
  }
  .code-json { color: #c8d4ff; }
  .code-term { color: #d6e0c0; background: #0d1014; }

  .caret {
    display: inline-block;
    margin-left: 1px;
    color: var(--accent);
    animation: caret 1s steps(2) infinite;
  }
  @keyframes caret { 50% { opacity: 0; } }

  /* pill */
  .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-family: var(--mono); font-size: 10.5px; }
  .pill-warn { background: rgba(245,181,74,.15); color: var(--warn); }
  .pill-info { background: rgba(122,182,255,.15); color: var(--info); }
  .pill-ok   { background: rgba(95,207,144,.15); color: var(--ok); }

  /* ─── Grids per view ──────────────────────────────────────────────────── */

  .nv-grid {
    display: grid;
    gap: var(--gap);
    grid-template-columns: repeat(3, 1fr);
    min-height: 0;
  }
  .nv-grid > .panel.span-1 { grid-column: span 1; }
  .nv-grid > .panel.span-2 { grid-column: span 2; }
  .nv-grid > .panel.span-3 { grid-column: span 3; }

  /* ─── Source view extras ──────────────────────────────────────────────── */

  .streaming-bar { position: relative; height: 36px; border-radius: 6px; background: rgba(255,255,255,.025); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .streaming-bar-fill { position: absolute; inset: 0 60% 0 0; background: linear-gradient(90deg, transparent, var(--accent-dim), transparent); animation: sweep 1.4s ease-in-out infinite; }
  @keyframes sweep { 0% { transform: translateX(-50%);} 100% { transform: translateX(200%);} }
  .streaming-bar-label { position: relative; z-index: 1; color: var(--fg-2); font-size: 11px; }

  .rowset { display: grid; gap: 1px; background: var(--line-1); border-radius: 4px; overflow: hidden; }
  .rowset-h, .rowset-r { display: grid; grid-template-columns: 90px 1fr 90px 110px 1fr 60px; gap: 12px; padding: 8px 12px; background: var(--bg-3); font-size: 11.5px; align-items: center; }
  .rowset-h { color: var(--fg-3); text-transform: uppercase; font-size: 10px; letter-spacing: .08em; background: rgba(255,255,255,.02); }
  .rowset-id { color: var(--accent); font-weight: 600; }

  .statsbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat { background: var(--bg-2); border: 1px solid var(--line-1); border-radius: 6px; padding: 10px 12px; }
  .stat-v { font-size: 18px; color: var(--fg-0); font-weight: 600; }
  .stat-k { font-size: 10.5px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }

  /* ─── LLM view ────────────────────────────────────────────────────────── */

  .prose-clip { margin: 0; color: var(--fg-1); font-size: 12.5px; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .reason { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .reason li { display: grid; grid-template-columns: 24px 1fr; gap: 10px; align-items: start; color: var(--fg-1); font-size: 12px; line-height: 1.5; }
  .reason-n { font-family: var(--mono); color: var(--fg-3); font-size: 10.5px; padding-top: 2px; }
  .reason-typing { color: var(--fg-2); }

  /* shimmer typing */
  .shimmer { display: inline-flex; gap: 5px; padding: 2px 0; }
  .shimmer span { width: 6px; height: 6px; border-radius: 50%; background: var(--fg-3); animation: shim 1.2s ease-in-out infinite; }
  .shimmer span:nth-child(2) { animation-delay: .15s; }
  .shimmer span:nth-child(3) { animation-delay: .3s; }
  @keyframes shim { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; background: var(--accent); } }

  /* ─── Search / traversal view ─────────────────────────────────────────── */

  .cursor-card { display: flex; flex-direction: column; gap: 8px; }
  .cursor-label { font-size: 10.5px; text-transform: uppercase; color: var(--fg-3); letter-spacing: .08em; }
  .cursor-path { font-size: 14px; color: var(--fg-0); }
  .cursor-hit { display: inline-flex; gap: 8px; color: var(--accent); font-size: 12px; align-items: center; }
  .cursor-arrow { color: var(--fg-3); }

  .retrieved { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
  .retrieved li {
    display: grid; grid-template-columns: 40px 1fr 1fr; gap: 12px;
    padding: 6px 8px; border-radius: 4px;
    align-items: center; font-size: 12px;
  }
  .retrieved li.is-current { background: var(--accent-dim); border: 1px solid var(--accent); padding: 5px 7px; }
  .retrieved-score { color: var(--fg-3); text-align: right; }
  .retrieved-path  { color: var(--fg-0); }
  .retrieved-hit   { color: var(--fg-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .retrieved li.is-current .retrieved-score { color: var(--accent); }

  .mini-graph { width: 100%; height: 220px; }
  .mini-label { font-family: var(--mono); font-size: 9.5px; fill: var(--fg-2); }

  /* ─── Agent loop (the hero view) ──────────────────────────────────────── */

  .agent-grid {
    display: grid;
    gap: var(--gap);
    grid-template-columns: 1fr 1.4fr 1fr;
    grid-template-rows: auto 1fr auto;
    min-height: 0;
    flex: 1;
  }
  .agent-strip {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    border-radius: var(--rad);
    font-size: 11.5px;
  }
  .agent-strip-l { display: inline-flex; gap: 10px; align-items: center; color: var(--fg-2); flex-wrap: wrap; }
  .agent-strip-l b { color: var(--fg-0); }
  .agent-strip-l .sep { color: var(--fg-3); }
  .agent-iter b { color: var(--accent); font-weight: 600; }
  .agent-strip-r { display: inline-flex; gap: 6px; }

  .agent-thoughts { grid-row: 2; grid-column: 1; min-height: 0; }
  .agent-code     { grid-row: 2; grid-column: 2; min-height: 0; }
  .agent-tests    { grid-row: 2; grid-column: 3; min-height: 0; }
  .agent-logs     { grid-row: 3; grid-column: 1 / -1; max-height: 160px; }

  .agent-thoughts .panel-b { overflow: hidden; padding: 0; }
  .thought-list {
    height: 100%;
    overflow: auto;
    padding: 10px;
    display: flex; flex-direction: column; gap: 8px;
    scroll-behavior: smooth;
  }
  .thought { background: var(--bg-2); border: 1px solid var(--line-1); border-left: 2px solid var(--mute-2); border-radius: 4px; padding: 8px 10px; }
  .thought-meta { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
  .thought-tag { font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: .06em; padding: 1px 6px; border-radius: 3px; background: rgba(255,255,255,.05); color: var(--fg-2); }
  .thought-tag-plan  { background: rgba(122,182,255,.14); color: var(--info); }
  .thought-tag-read  { background: rgba(168,156,255,.14); color: #b1a6ff; }
  .thought-tag-write { background: rgba(61,220,151,.14); color: var(--accent); }
  .thought-tag-test  { background: rgba(245,181,74,.14); color: var(--warn); }
  .thought-tag-typing { background: var(--accent-dim); color: var(--accent); }
  .thought-time { color: var(--fg-3); font-size: 10.5px; margin-left: auto; }
  .thought-text { color: var(--fg-1); font-size: 12px; line-height: 1.5; }
  .thought-plan  { border-left-color: var(--info); }
  .thought-read  { border-left-color: #b1a6ff; }
  .thought-write { border-left-color: var(--accent); }
  .thought-test  { border-left-color: var(--warn); }
  .thought-typing { border-left-color: var(--accent); }

  /* code pane */
  .agent-code .panel-h { gap: 4px; }
  .file-tab { display: inline-flex; align-items: center; gap: 6px; padding: 4px 8px; font-family: var(--mono); font-size: 11px; color: var(--fg-2); border-radius: 4px; }
  .file-tab.is-active { color: var(--fg-0); background: rgba(255,255,255,.04); }
  .file-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); }

  .codepane { display: grid; grid-template-columns: 44px 1fr; height: 100%; min-height: 0; overflow: hidden; }
  .codepane-gutter {
    display: flex; flex-direction: column; align-items: flex-end;
    padding: 12px 8px;
    color: var(--fg-3); font-family: var(--mono); font-size: 11px; line-height: 1.55;
    border-right: 1px solid var(--line-1);
    user-select: none;
  }
  .codepane-text {
    margin: 0;
    padding: 12px 14px;
    font-family: var(--mono); font-size: 12px; line-height: 1.55;
    color: #d8e0ee;
    white-space: pre;
    overflow: auto;
    tab-size: 2;
  }

  /* tests list */
  .tests { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
  .test { display: grid; grid-template-columns: 22px 1fr auto; gap: 8px; align-items: center; padding: 6px 8px; font-size: 12px; border-radius: 4px; }
  .test-pass    { color: var(--fg-1); }
  .test-fail    { color: var(--err); background: rgba(239,106,106,.06); }
  .test-running { color: var(--accent); background: var(--accent-dim); }
  .test-dot { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; font-weight: 700; }
  .test-dot-pass { background: rgba(95,207,144,.18); color: var(--ok); }
  .test-dot-fail { background: rgba(239,106,106,.18); color: var(--err); }
  .test-dot-run  { background: var(--accent-dim); }
  .test-name { font-family: var(--mono); font-size: 11.5px; }
  .test-ms { color: var(--fg-3); font-size: 11px; }

  /* log list */
  .loglist { list-style: none; padding: 10px 14px; margin: 0; font-family: var(--mono); font-size: 11.5px; line-height: 1.6; color: var(--fg-2); max-height: 140px; overflow: auto; }
  .loglist li { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .loglist li:last-child { color: var(--accent); }

  /* ─── Tool view ───────────────────────────────────────────────────────── */

  .bigstat { display: flex; flex-direction: column; gap: 4px; padding: 10px 0; }
  .bigstat-v { font-family: var(--mono); font-size: 36px; font-weight: 600; line-height: 1; color: var(--fg-0); }
  .bigstat-v.ok { color: var(--ok); }
  .bigstat-v.fail { color: var(--err); }
  .bigstat-k { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .08em; }

  /* ─── Decision view ───────────────────────────────────────────────────── */

  .branches { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .branch { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 4px; border: 1px solid var(--line-2); }
  .branch.is-taken { background: var(--accent-dim); border-color: var(--accent); color: var(--fg-0); }
  .branch.is-skipped { color: var(--fg-3); border-style: dashed; }
  .branch-l { display: inline-flex; align-items: center; gap: 10px; }
  .branch-arrow { font-family: var(--mono); }
  .branch.is-taken .branch-arrow { color: var(--accent); }
  .branch-label { font-family: var(--mono); }
  .branch-r { font-size: 11.5px; color: var(--fg-2); }

  /* ─── Pending / skipped placeholders ──────────────────────────────────── */

  .nv-pending {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 40px;
  }
  .nv-pending-card {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--fg-2);
    max-width: 320px;
    text-align: center;
  }
  .nv-pending-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,.04);
    border: 1px dashed var(--line-3);
    color: var(--fg-3);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .nv-pending-title { font-family: var(--mono); color: var(--fg-1); }
  .nv-pending-sub { font-size: 11.5px; color: var(--fg-3); }

  /* ─── Timeline ────────────────────────────────────────────────────────── */

  .timeline {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    background: linear-gradient(0deg, #0e1015, var(--bg-0));
  }
  .timeline-l { display: inline-flex; align-items: center; gap: 12px; }
  .tl-label { font-size: 10.5px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .1em; }
  .tl-jump { font-family: var(--mono); font-size: 11px; color: var(--accent); background: transparent; border: 1px solid var(--accent); border-radius: 4px; padding: 3px 8px; }
  .timeline-track {
    position: relative;
    height: 28px;
    background: rgba(255,255,255,.025);
    border-radius: 4px;
    border: 1px solid var(--line-1);
    cursor: default;
  }
  .tl-seg {
    position: absolute;
    top: 3px; bottom: 3px;
    border-radius: 2px;
    overflow: hidden;
    display: flex; align-items: center;
    padding: 0 6px;
    font-family: var(--mono); font-size: 9.5px;
    color: rgba(255,255,255,.7);
    border-right: 1px solid rgba(0,0,0,.3);
  }
  .tl-seg.is-pending { background: rgba(255,255,255,.04); color: var(--fg-3); }
  .tl-seg.is-running { background: var(--accent); color: #062014; font-weight: 600; }
  .tl-seg.is-done    { background: rgba(95,207,144,.35); color: var(--fg-0); }
  .tl-seg.is-skipped { background: rgba(255,255,255,.02); color: var(--fg-3); }
  .tl-seg.is-selected { outline: 1.5px solid var(--accent); outline-offset: -1px; }
  .tl-seg-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tl-cursor {
    position: absolute; top: -4px; bottom: -4px;
    width: 2px; background: var(--fg-0);
    box-shadow: 0 0 8px rgba(255,255,255,.6);
    transform: translateX(-1px);
    pointer-events: none;
  }
  .timeline-r { font-size: 11.5px; color: var(--fg-2); }

  /* ─── Tweaks panel overrides ─────────────────────────────────────────── */

  .twk-panel {
    background: rgba(20, 23, 28, .88) !important;
    color: var(--fg-1) !important;
    border: 1px solid var(--line-3) !important;
    box-shadow: 0 18px 60px rgba(0,0,0,.5) !important;
  }
  .twk-panel .twk-hd b { color: var(--fg-0); }
  .twk-panel .twk-x { color: var(--fg-2); }
  .twk-panel .twk-x:hover { background: rgba(255,255,255,.08); color: var(--fg-0); }
  .twk-panel .twk-lbl { color: var(--fg-2) !important; }
  .twk-panel .twk-val { color: var(--fg-3) !important; }
  .twk-panel .twk-sect { color: var(--fg-3) !important; }
  .twk-swatches { display: flex; gap: 6px; }
  .twk-swatch { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--line-3); cursor: default; }
  .twk-swatch.is-on { outline: 2px solid var(--fg-0); outline-offset: 2px; }

  /* ─── Launcher ────────────────────────────────────────────────────────── */

  .launcher {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
    background:
      radial-gradient(1000px 600px at 80% 10%, rgba(61,220,151,.06), transparent 60%),
      radial-gradient(800px 500px at -10% 110%, rgba(122,182,255,.04), transparent 60%),
      var(--bg-0);
  }
  .launcher-card {
    width: min(720px, 100%);
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    border-radius: 12px;
    padding: 28px 28px 22px;
    box-shadow: 0 18px 60px rgba(0,0,0,.4);
  }
  .launcher-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 18px; }
  .launcher-brand-mark { color: var(--accent); animation: brandSpin 4s linear infinite; display: inline-block; }
  .launcher-brand { color: var(--fg-0); font-weight: 700; font-size: 18px; letter-spacing: -.01em; }
  .launcher-sub { color: var(--fg-3); font-size: 12px; }
  .launcher-title { color: var(--fg-0); font-size: 14px; font-weight: 600; margin: 14px 0 8px; letter-spacing: -.005em; }
  .launcher-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
  }
  .launcher-input {
    appearance: none;
    background: var(--bg-2);
    color: var(--fg-0);
    border: 1px solid var(--line-3);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
  }
  .launcher-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
  .launcher-go {
    background: var(--accent);
    border: 1px solid transparent;
    color: #062014;
    font-weight: 600;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 13px;
    cursor: pointer;
  }
  .launcher-go:disabled { opacity: .5; cursor: not-allowed; }
  .launcher-go:hover:not(:disabled) { filter: brightness(1.1); }
  .launcher-err { color: var(--err); font-size: 12px; margin-top: 8px; min-height: 1em; }
  .launcher-quick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; font-size: 11px; }
  .launcher-quick button {
    background: transparent;
    border: 1px solid var(--line-2);
    border-radius: 999px;
    color: var(--fg-2);
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
  }
  .launcher-quick button:hover { color: var(--fg-0); border-color: var(--line-3); background: var(--bg-3h); }

  .launcher-runs {
    list-style: none; padding: 0; margin: 8px 0 0;
    display: flex; flex-direction: column;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    overflow: hidden;
  }
  .launcher-run {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 14px;
    padding: 10px 14px;
    align-items: center;
    background: var(--bg-2);
    border-top: 1px solid var(--line-1);
    cursor: pointer;
    font-size: 12px;
    color: var(--fg-1);
    text-decoration: none;
  }
  .launcher-run:first-child { border-top: 0; }
  .launcher-run:hover { background: var(--bg-3h); }
  .launcher-run-id { font-family: var(--mono); color: var(--fg-0); overflow: hidden; text-overflow: ellipsis; }
  .launcher-run-status {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid var(--line-2);
  }
  .launcher-run-status.is-running { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  .launcher-run-time { color: var(--fg-3); font-family: var(--mono); font-size: 11px; }

  .launcher-foot { margin-top: 14px; display: flex; justify-content: space-between; font-size: 11.5px; color: var(--fg-3); }

  /* ─── scrollbars ──────────────────────────────────────────────────────── */

# SPDX-License-Identifier: Apache-2.0
#
# Phase 6 offline learning channel (v6).
# Runs on a NETWORK-ISOLATED host: egress only on a one-way socket that
# accepts the signed prompts.tar drop. No inbound from production.
# Enforced at firewall, not just convention.
#
# Cadence: Phase-2 weekly shadow / Phase-3+ nightly.
ir_version: "1.0.0"
id: "graph:cve-rem-offline-learning"

nodes:
  - id: pull_holdout_retros        # 19 from postgres replica eval schema
    kind: "demos.cve_remediation.graph.real_nodes:PullHoldoutRetrosNode"
  - id: redaction_transform        # signed Fathom redaction pack
    kind: "demos.cve_remediation.graph.real_nodes:RedactionTransformNode"
  - id: emit_redacted_corpus       # P1: artifact for audit
    kind: "demos.cve_remediation.graph.real_nodes:EmitRedactedCorpusNode"
  - id: gepa_compile_planner       # 20 planner module
    kind: "demos.cve_remediation.graph.real_nodes:GepaCompilePlannerNode"
  - id: gepa_compile_critic        # 20 critic module
    kind: "demos.cve_remediation.graph.real_nodes:GepaCompileCriticNode"
  - id: score_on_holdout           # 20 weighted score (not all-AND)
    kind: "demos.cve_remediation.graph.real_nodes:GepaScoreComputerNode"
  - id: gate_strictly_better       # 20 epsilon margin check (rule-based)
    kind: "demos.cve_remediation.graph.real_nodes:GateStrictlyBetterNode"
  - id: reject_artifact            # below margin
    kind: "demos.cve_remediation.graph.real_nodes:RejectArtifactNode"
  - id: shamir_ceremony            # 21 2-of-3 distinct roles
    kind: "demos.cve_remediation.graph.real_nodes:ShamirCeremonyNode"
  - id: emit_compiled_artifact     # P1: prompt tarball ArtifactRef
    kind: "demos.cve_remediation.graph.real_nodes:WriteArtifactRealNode"
  - id: ship_to_prompts_dir        # 22 /etc/krakn/prompts/ + audit-chain post
    kind: "demos.cve_remediation.graph.real_nodes:ShipToPromptsDirNode"
  - id: signal_rolling_restart     # 22 emit artifact_ready signal -> rolling_restart graph
    kind: "demos.cve_remediation.graph.real_nodes:SignalRollingRestartNode"

state_class: "demos.cve_remediation.graph.state:CveRemState"

tools:
  # nautilus.broker_request is the canonical Harbor-registered tool;
  # postgres replica reads + audit chain appends route through it via
  # Nautilus adapters.
  - id: nautilus.broker_request
    version: "1"
  - id: fathom.redaction_pack             # placeholder
    version: "1.0"
  - id: dspy.gepa_compile                 # placeholder
    version: "1.0"
  - id: krakntrust.shamir_sign            # placeholder; signed-CLI integration
    version: "1.0"
  - id: krakntrust.ship_artifact          # placeholder
    version: "1.0"
  - id: artifacts.write                   # for emit_redacted_corpus + emit_compiled_artifact
    version: "1.0"

governance:
  - id: harbor.bosun.audit
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }
  - id: cve_rem.offline_isolation
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }
  - id: cve_rem.gepa_score_policy
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }

stores: []  # Phase E binds real provider list (StoreRef[])


rules:
  - id: r-pull-redact
    when: "?n <- (node-id (id pull_holdout_retros))"
    then: [{ kind: goto, target: redaction_transform }]
  - id: r-redact-emit
    when: "?n <- (node-id (id redaction_transform))"
    then: [{ kind: goto, target: emit_redacted_corpus }]
  - id: r-redacted-planner
    when: "?n <- (node-id (id emit_redacted_corpus))"
    then: [{ kind: goto, target: gepa_compile_planner }]
  - id: r-planner-critic
    when: "?n <- (node-id (id gepa_compile_planner))"
    then: [{ kind: goto, target: gepa_compile_critic }]
  - id: r-critic-score
    when: "?n <- (node-id (id gepa_compile_critic))"
    then: [{ kind: goto, target: score_on_holdout }]
  - id: r-score-gate
    when: "?n <- (node-id (id score_on_holdout))"
    then: [{ kind: goto, target: gate_strictly_better }]

  - id: r-reject
    when: "?n <- (node-id (id gate_strictly_better)) (state (strictly_better false))"
    then: [{ kind: goto, target: reject_artifact }]
  - id: r-accept
    when: "?n <- (node-id (id gate_strictly_better)) (state (strictly_better true))"
    then: [{ kind: goto, target: shamir_ceremony }]

  - id: r-reject-halt
    when: "?n <- (node-id (id reject_artifact))"
    then:
      - kind: halt
        reason: "Candidate artifact below epsilon margin; rejected"

  - id: r-shamir-emit
    when: "?n <- (node-id (id shamir_ceremony)) (state (shamir_quorum reached))"
    then: [{ kind: goto, target: emit_compiled_artifact }]
  - id: r-shamir-fail
    when: "?n <- (node-id (id shamir_ceremony)) (state (shamir_quorum not_reached))"
    then:
      - kind: halt
        reason: "Shamir quorum not reached; artifact not shipped"
  - id: r-emit-ship
    when: "?n <- (node-id (id emit_compiled_artifact))"
    then: [{ kind: goto, target: ship_to_prompts_dir }]

  - id: r-ship-signal
    when: "?n <- (node-id (id ship_to_prompts_dir))"
    then: [{ kind: goto, target: signal_rolling_restart }]
  - id: r-signal-halt
    when: "?n <- (node-id (id signal_rolling_restart))"
    then:
      - kind: halt
        reason: "Artifact shipped; rolling_restart graph spawned via webhook"

# SPDX-License-Identifier: Apache-2.0
#
# Sandbox dispatch sub-graph (v6 step 11).
# Parent calls this with sandbox_runtime preset by sandbox_dispatch node.
# Three branches; each runs the 4-step probe (or 2-step for static).
ir_version: "1.0.0"
id: "graph:cve-rem-sandbox-dispatch"

nodes:
  - id: branch_runtime
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  # --- 11a CargoNet lab probe ---
  - id: cargonet_lab_deploy
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: cargonet_baseline_probe
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: cargonet_apply
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: cargonet_post_apply_probe
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: cargonet_rollback
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: cargonet_post_rollback_probe
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: cargonet_reapply
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: cargonet_regression_probe
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: cargonet_lab_destroy
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  # --- 11b docker-compose probe ---
  - id: docker_baseline
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: docker_apply
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: docker_post_apply
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: docker_rollback
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: docker_post_rollback
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: docker_reapply
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: docker_regression
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: docker_teardown
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  # --- 11c static-detection only ---
  - id: static_baseline
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: static_apply_diff
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  # --- emit ---
  - id: emit_sandbox_result
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"

state_class: "demos.cve_remediation.graph.state:CveRemState"

rules:
  - id: r-branch-cargonet
    when: "?n <- (node-id (id branch_runtime)) (state (sandbox_runtime cargonet_lab))"
    then: [{ kind: goto, target: cargonet_lab_deploy }]
  - id: r-branch-docker
    when: "?n <- (node-id (id branch_runtime)) (state (sandbox_runtime docker_compose))"
    then: [{ kind: goto, target: docker_baseline }]
  - id: r-branch-static
    when: "?n <- (node-id (id branch_runtime)) (state (sandbox_runtime static_detection))"
    then: [{ kind: goto, target: static_baseline }]

  # CargoNet 4-step
  - id: r-cnet-1
    when: "?n <- (node-id (id cargonet_lab_deploy))"
    then: [{ kind: goto, target: cargonet_baseline_probe }]
  - id: r-cnet-2
    when: "?n <- (node-id (id cargonet_baseline_probe))"
    then: [{ kind: goto, target: cargonet_apply }]
  - id: r-cnet-3
    when: "?n <- (node-id (id cargonet_apply))"
    then: [{ kind: goto, target: cargonet_post_apply_probe }]
  - id: r-cnet-4
    when: "?n <- (node-id (id cargonet_post_apply_probe))"
    then: [{ kind: goto, target: cargonet_rollback }]
  - id: r-cnet-5
    when: "?n <- (node-id (id cargonet_rollback))"
    then: [{ kind: goto, target: cargonet_post_rollback_probe }]
  - id: r-cnet-6
    when: "?n <- (node-id (id cargonet_post_rollback_probe))"
    then: [{ kind: goto, target: cargonet_reapply }]
  - id: r-cnet-7
    when: "?n <- (node-id (id cargonet_reapply))"
    then: [{ kind: goto, target: cargonet_regression_probe }]
  - id: r-cnet-8
    when: "?n <- (node-id (id cargonet_regression_probe))"
    then: [{ kind: goto, target: cargonet_lab_destroy }]
  - id: r-cnet-9
    when: "?n <- (node-id (id cargonet_lab_destroy))"
    then: [{ kind: goto, target: emit_sandbox_result }]

  # Docker 4-step
  - id: r-doc-1
    when: "?n <- (node-id (id docker_baseline))"
    then: [{ kind: goto, target: docker_apply }]
  - id: r-doc-2
    when: "?n <- (node-id (id docker_apply))"
    then: [{ kind: goto, target: docker_post_apply }]
  - id: r-doc-3
    when: "?n <- (node-id (id docker_post_apply))"
    then: [{ kind: goto, target: docker_rollback }]
  - id: r-doc-4
    when: "?n <- (node-id (id docker_rollback))"
    then: [{ kind: goto, target: docker_post_rollback }]
  - id: r-doc-5
    when: "?n <- (node-id (id docker_post_rollback))"
    then: [{ kind: goto, target: docker_reapply }]
  - id: r-doc-6
    when: "?n <- (node-id (id docker_reapply))"
    then: [{ kind: goto, target: docker_regression }]
  - id: r-doc-7
    when: "?n <- (node-id (id docker_regression))"
    then: [{ kind: goto, target: docker_teardown }]
  - id: r-doc-8
    when: "?n <- (node-id (id docker_teardown))"
    then: [{ kind: goto, target: emit_sandbox_result }]

  # Static-detection 2-step (no probe-able state change)
  - id: r-stat-1
    when: "?n <- (node-id (id static_baseline))"
    then: [{ kind: goto, target: static_apply_diff }]
  - id: r-stat-2
    when: "?n <- (node-id (id static_apply_diff))"
    then: [{ kind: goto, target: emit_sandbox_result }]

  - id: r-emit-halt
    when: "?n <- (node-id (id emit_sandbox_result))"
    then:
      - kind: halt
        reason: "Sandbox dispatch complete"

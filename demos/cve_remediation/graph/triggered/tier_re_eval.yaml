# SPDX-License-Identifier: Apache-2.0
#
# Tier re-evaluation — TRIGGERED GRAPH (v6 SSVC step 7 follow-up).
# Scans Asset-KG for (:CVE)-[:TRACKED]->(:Asset) and
# (:CVE)-[:DEFERRED {until}]->(:Asset) edges. Re-fires SSVC against
# current EPSS / KEV state; transitions edges or spawns main pipeline
# instances when the tier escalates.
#
# Trigger: cron (hourly default; configurable for staging vs prod).
ir_version: "1.0.0"
id: "graph:cve-rem-tier-re-eval"

nodes:
  - id: scan_tracked_deferred       # Asset-KG read
    kind: "demos.cve_remediation.graph.real_nodes:ScanTrackedDeferredNode"
  - id: refresh_epss_kev            # broker pull from FIRST + CISA
    kind: "demos.cve_remediation.graph.real_nodes:RefreshEpssKevNode"
  - id: re_evaluate_ssvc            # Fathom rule-eval
    kind: "demos.cve_remediation.graph.real_nodes:ReEvaluateSsvcNode"
  - id: branch_transitions          # decide per (cve, asset) tuple
    kind: "demos.cve_remediation.graph.nodes:PassthroughStub"
  - id: spawn_main_pipeline_runs    # for any (cve,asset) escalating to ACT_*
    kind: "demos.cve_remediation.graph.real_nodes:SpawnMainPipelineRunsNode"
  - id: update_tier_edges           # rewrite TRACKED/DEFERRED edges in place
    kind: "demos.cve_remediation.graph.real_nodes:UpdateTierEdgesNode"
  - id: emit_re_eval_summary        # for ops dashboards
    kind: "demos.cve_remediation.graph.real_nodes:EmitReEvalSummaryNode"

state_class: "demos.cve_remediation.graph.state:TierReEvalState"

tools:
  - id: nautilus.broker_request           # canonical broker
    version: "1"
  - id: ryugraph.cypher                   # placeholder
    version: "1.0"
  - id: fathom.ssvc_evaluate              # placeholder
    version: "1.0"
  - id: artifacts.write                   # for emit_re_eval_summary
    version: "1.0"

governance:
  - id: harbor.bosun.budgets
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }
  - id: harbor.bosun.audit
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }
  - id: harbor.bosun.retries
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }

stores: []  # Phase E binds real provider list (StoreRef[])


rules:
  - id: r-scan-refresh
    when: "?n <- (node-id (id scan_tracked_deferred))"
    then: [{ kind: goto, target: refresh_epss_kev }]
  - id: r-refresh-eval
    when: "?n <- (node-id (id refresh_epss_kev))"
    then: [{ kind: goto, target: re_evaluate_ssvc }]
  - id: r-eval-branch
    when: "?n <- (node-id (id re_evaluate_ssvc))"
    then: [{ kind: goto, target: branch_transitions }]

  - id: r-branch-fanout
    when: "?n <- (node-id (id branch_transitions))"
    then:
      - kind: parallel
        targets: [spawn_main_pipeline_runs, update_tier_edges]
        join: emit_re_eval_summary
        strategy: all

  - id: r-summary-halt
    when: "?n <- (node-id (id emit_re_eval_summary))"
    then: [{ kind: halt, reason: "Tier re-evaluation sweep complete" }]

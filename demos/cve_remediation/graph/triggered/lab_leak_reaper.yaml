# SPDX-License-Identifier: Apache-2.0
#
# Lab-leak reaper — TRIGGERED GRAPH (v6 orthogonal safety block).
# Sweeps CargoNet labs whose age exceeds the per-scenario TTL and
# tears them down. Default TTL 24h.
#
# Trigger: cron (hourly).
ir_version: "1.0.0"
id: "graph:cve-rem-lab-leak-reaper"

nodes:
  - id: list_active_labs            # CargoNet API GET /v1/labs
    kind: "demos.cve_remediation.graph.real_nodes:ListActiveLabsNode"
  - id: filter_expired              # state-only filter
    kind: "demos.cve_remediation.graph.real_nodes:FilterExpiredNode"
  - id: reap_expired                # CargoNet DELETE per lab
    kind: "demos.cve_remediation.graph.real_nodes:ReapExpiredNode"
  - id: emit_reaper_summary         # artifact for ops dashboard
    kind: "demos.cve_remediation.graph.real_nodes:EmitReaperSummaryNode"

state_class: "demos.cve_remediation.graph.state:LabLeakReaperState"

tools:
  - id: nautilus.broker_request           # canonical broker; CargoNet API routes via
    version: "1"
  - id: artifacts.write                   # for emit_reaper_summary
    version: "1.0"

governance:
  - id: harbor.bosun.audit
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }
  - id: harbor.bosun.retries
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }
  - id: harbor.bosun.budgets
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }

stores: []  # Phase E binds real provider list (StoreRef[])


rules:
  - id: r-list-filter
    when: "?n <- (node-id (id list_active_labs))"
    then: [{ kind: goto, target: filter_expired }]
  - id: r-filter-reap
    when: "?n <- (node-id (id filter_expired)) (state (expired_lab_count > 0))"
    then: [{ kind: goto, target: reap_expired }]
  - id: r-filter-noop
    when: "?n <- (node-id (id filter_expired)) (state (expired_lab_count 0))"
    then: [{ kind: halt, reason: "No expired labs; reaper sweep complete" }]
  - id: r-reap-summary
    when: "?n <- (node-id (id reap_expired))"
    then: [{ kind: goto, target: emit_reaper_summary }]
  - id: r-summary-halt
    when: "?n <- (node-id (id emit_reaper_summary))"
    then: [{ kind: halt, reason: "Reaper sweep complete; expired labs torn down" }]

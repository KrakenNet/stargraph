# SPDX-License-Identifier: Apache-2.0
#
# Drift watch — TRIGGERED GRAPH (v6 step 15).
# Spawned by main pipeline's drift_watch_spawn node via webhook trigger
# (POST /v1/runs with parent_run_id). Runs 24-72h passive watch
# independent of the parent — main pipeline halts cleanly while this
# graph stays alive.
#
# Trigger: webhook (parent emits) + cron fallback (sweeps any orphaned
#   drift_watch state on hourly cadence).
#
# Drift routing:
#   detected AND same_cve_signature  -> spawn child main pipeline run
#                                       with parent_run_id reference
#   detected AND different_signature -> page on-call (no auto-spawn)
#   no drift                         -> halt clean
ir_version: "1.0.0"
id: "graph:cve-rem-drift-watch"

nodes:
  - id: schedule_watch
    kind: "demos.cve_remediation.graph.real_nodes:ScheduleWatchNode"
  - id: collect_drift_events
    kind: "demos.cve_remediation.graph.real_nodes:CollectDriftEventsNode"
  - id: classify_drift
    kind: "demos.cve_remediation.graph.real_nodes:ClassifyDriftNode"
  - id: spawn_child_run
    kind: "demos.cve_remediation.graph.real_nodes:SpawnChildRunNode"
  - id: page_oncall
    kind: "demos.cve_remediation.graph.real_nodes:PageOncallNode"
  - id: noop_clean
    kind: "demos.cve_remediation.graph.real_nodes:NoopCleanNode"
  - id: emit_drift_window_summary # forensic ArtifactRef per watch window
    kind: "demos.cve_remediation.graph.real_nodes:EmitDriftWindowSummaryNode"

state_class: "demos.cve_remediation.graph.state:DriftWatchState"

tools:
  - id: nautilus.broker_request           # canonical broker; gNMI/Influx/PagerDuty all dispatch via Nautilus adapters
    version: "1"
  - id: artifacts.write                   # for emit_drift_window_summary
    version: "1.0"

governance:
  - id: harbor.bosun.audit
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }
  - id: harbor.bosun.retries
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }

stores: []  # Phase E binds real provider list (StoreRef[])


rules:
  - id: r-schedule
    when: "?n <- (node-id (id schedule_watch))"
    then: [{ kind: goto, target: collect_drift_events }]
  - id: r-collect
    when: "?n <- (node-id (id collect_drift_events))"
    then: [{ kind: goto, target: classify_drift }]

  - id: r-drift-same
    when: "?n <- (node-id (id classify_drift)) (state (drift_detected true)) (state (drift_signature_match true))"
    then: [{ kind: goto, target: spawn_child_run }]
  - id: r-drift-diff
    when: "?n <- (node-id (id classify_drift)) (state (drift_detected true)) (state (drift_signature_match false))"
    then: [{ kind: goto, target: page_oncall }]
  - id: r-drift-none
    when: "?n <- (node-id (id classify_drift)) (state (drift_detected false))"
    then: [{ kind: goto, target: noop_clean }]

  # All three terminal branches converge on emit_drift_window_summary so
  # every watch window leaves a forensic ArtifactRef regardless of outcome.
  - id: r-spawn-emit
    when: "?n <- (node-id (id spawn_child_run))"
    then: [{ kind: goto, target: emit_drift_window_summary }]
  - id: r-page-emit
    when: "?n <- (node-id (id page_oncall))"
    then: [{ kind: goto, target: emit_drift_window_summary }]
  - id: r-noop-emit
    when: "?n <- (node-id (id noop_clean))"
    then: [{ kind: goto, target: emit_drift_window_summary }]

  - id: r-emit-halt-spawned
    when: "?n <- (node-id (id emit_drift_window_summary)) (state (drift_outcome spawned))"
    then: [{ kind: halt, reason: "Drift re-emergence: child pipeline spawned; summary archived" }]
  - id: r-emit-halt-paged
    when: "?n <- (node-id (id emit_drift_window_summary)) (state (drift_outcome paged))"
    then: [{ kind: halt, reason: "Drift different-signature: paged on-call; summary archived" }]
  - id: r-emit-halt-clean
    when: "?n <- (node-id (id emit_drift_window_summary)) (state (drift_outcome clean))"
    then: [{ kind: halt, reason: "No drift detected within watch window; summary archived" }]

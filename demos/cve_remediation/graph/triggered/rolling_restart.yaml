# SPDX-License-Identifier: Apache-2.0
#
# Rolling restart — TRIGGERED GRAPH (v6 step 22 follow-up).
# Workers pick up new compiled-prompt artifacts only on restart. This
# graph performs a rolling restart of the worker fleet with health
# gates between batches. Previous-generation pointer preserved for
# rollback.
#
# Triggers:
#   - webhook: post-Shamir ship event emits artifact_ready -> spawn here
#   - cron: weekly maintenance window (Sunday 04:00 UTC)
#   - manual: pipeline-owner via signed CLI (audited)
ir_version: "1.0.0"
id: "graph:cve-rem-rolling-restart"

nodes:
  - id: select_artifact             # /etc/krakn/prompts/<artifact_id>
    kind: "demos.cve_remediation.graph.real_nodes:SelectArtifactNode"
  - id: snapshot_current_pointer    # save previous-generation for rollback
    kind: "demos.cve_remediation.graph.real_nodes:SnapshotCurrentPointerNode"
  - id: list_worker_batches         # batch fleet by replication group
    kind: "demos.cve_remediation.graph.real_nodes:ListWorkerBatchesNode"
  - id: restart_batch_1
    kind: "demos.cve_remediation.graph.real_nodes:RestartBatch1Node"
  - id: health_gate_batch_1
    kind: "demos.cve_remediation.graph.real_nodes:HealthGateBatch1Node"
  - id: restart_batch_2
    kind: "demos.cve_remediation.graph.real_nodes:RestartBatch2Node"
  - id: health_gate_batch_2
    kind: "demos.cve_remediation.graph.real_nodes:HealthGateBatch2Node"
  - id: restart_batch_3
    kind: "demos.cve_remediation.graph.real_nodes:RestartBatch3Node"
  - id: health_gate_batch_3
    kind: "demos.cve_remediation.graph.real_nodes:HealthGateBatch3Node"
  - id: emit_restart_summary
    kind: "demos.cve_remediation.graph.real_nodes:EmitRestartSummaryNode"
  - id: rollback_pointer            # any health-gate fail
    kind: "demos.cve_remediation.graph.real_nodes:RollbackPointerNode"
  - id: emit_rollback_record
    kind: "demos.cve_remediation.graph.real_nodes:EmitRollbackRecordNode"

state_class: "demos.cve_remediation.graph.state:RollingRestartState"

tools:
  - id: nautilus.broker_request           # canonical broker; restart batches + health probes route via
    version: "1"
  - id: krakntrust.artifact_select        # placeholder
    version: "1.0"
  - id: krakntrust.pointer_snapshot       # placeholder
    version: "1.0"
  - id: krakntrust.pointer_rollback       # placeholder
    version: "1.0"
  - id: artifacts.write                   # for emit_restart_summary + emit_rollback_record
    version: "1.0"

governance:
  - id: harbor.bosun.audit
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }
  - id: harbor.bosun.retries
    version: "1.0"
    requires: { harbor_facts_version: "1.0", api_version: "1" }

stores: []  # Phase E binds real provider list (StoreRef[])


rules:
  - id: r-select-snapshot
    when: "?n <- (node-id (id select_artifact))"
    then: [{ kind: goto, target: snapshot_current_pointer }]
  - id: r-snapshot-list
    when: "?n <- (node-id (id snapshot_current_pointer))"
    then: [{ kind: goto, target: list_worker_batches }]
  - id: r-list-batch1
    when: "?n <- (node-id (id list_worker_batches))"
    then: [{ kind: goto, target: restart_batch_1 }]
  - id: r-b1-gate
    when: "?n <- (node-id (id restart_batch_1))"
    then: [{ kind: goto, target: health_gate_batch_1 }]
  - id: r-b1-pass
    when: "?n <- (node-id (id health_gate_batch_1)) (state (batch_1_ok true))"
    then: [{ kind: goto, target: restart_batch_2 }]
  - id: r-b1-fail
    when: "?n <- (node-id (id health_gate_batch_1)) (state (batch_1_ok false))"
    then: [{ kind: goto, target: rollback_pointer }]

  - id: r-b2-gate
    when: "?n <- (node-id (id restart_batch_2))"
    then: [{ kind: goto, target: health_gate_batch_2 }]
  - id: r-b2-pass
    when: "?n <- (node-id (id health_gate_batch_2)) (state (batch_2_ok true))"
    then: [{ kind: goto, target: restart_batch_3 }]
  - id: r-b2-fail
    when: "?n <- (node-id (id health_gate_batch_2)) (state (batch_2_ok false))"
    then: [{ kind: goto, target: rollback_pointer }]

  - id: r-b3-gate
    when: "?n <- (node-id (id restart_batch_3))"
    then: [{ kind: goto, target: health_gate_batch_3 }]
  - id: r-b3-pass
    when: "?n <- (node-id (id health_gate_batch_3)) (state (batch_3_ok true))"
    then: [{ kind: goto, target: emit_restart_summary }]
  - id: r-b3-fail
    when: "?n <- (node-id (id health_gate_batch_3)) (state (batch_3_ok false))"
    then: [{ kind: goto, target: rollback_pointer }]

  - id: r-summary-halt
    when: "?n <- (node-id (id emit_restart_summary))"
    then: [{ kind: halt, reason: "Rolling restart complete; new artifact live" }]
  - id: r-rollback-record
    when: "?n <- (node-id (id rollback_pointer))"
    then: [{ kind: goto, target: emit_rollback_record }]
  - id: r-rollback-halt
    when: "?n <- (node-id (id emit_rollback_record))"
    then: [{ kind: halt, reason: "Rolling restart aborted; pointer rolled back to previous generation" }]

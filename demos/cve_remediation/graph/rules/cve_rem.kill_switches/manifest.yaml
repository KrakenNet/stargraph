id: cve_rem.kill_switches
version: "1.0"
flavor: "governance"
requires:
  harbor_facts_version: "1.0"
  api_version: "1"
provides:
  - "harbor_facts:cve_rem.metric"
  - "harbor_facts:cve_rem.kill_signal"
  - "harbor_facts:cve_rem.quorum_request"
  - "harbor_facts:bosun.violation"
description: >-
  Fathom error-budget rules (rollback-rate, sandbox-mismatch, stuck-state,
  cross-bucket) and Temporal kill-switch signal mappings with 2-of-3
  quorum requirement on rollback-in-flight. Operators assert
  ``cve_rem.metric`` facts (computed externally) and ``cve_rem.kill_signal``
  facts (issued by RBAC-gated CLI); rules emit ``bosun.violation halt``
  or ``cve_rem.quorum_request`` accordingly.

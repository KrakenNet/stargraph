# SPDX-License-Identifier: Apache-2.0
#
# cve_rem.routing — routing-flavor Bosun pack mounted by main graph.
#
# Routing packs supplement the inline rules in harbor.yaml. These rules
# fire on facts asserted by the main graph and produce additional
# routing decisions or auxiliary fact assertions. They never replace
# inline rules — the inline rules form the primary topology, this pack
# adds context-sensitive overlays.

id: "cve_rem.routing"
version: "1.0.0"
flavor: "routing"

api_version: "1"
harbor_facts_version: "1.0"

description: >-
  Tier escalation signals on EPSS/KEV transitions, template-lookup
  ranking by recency-weighted prior-success, deterministic code-runtime
  preference when extractor returns multiple candidates, defer-until
  date computation, Reflexion-buffer cross-CWE similarity weighting.

rules:
  # -------------------------------------------------------------------
  # Tier escalation overlays (consulted alongside SSVC inline routing).
  # -------------------------------------------------------------------
  - id: tier-escalate-on-kev-transition
    description: >-
      If a CVE was previously TRACK and EPSS just transitioned to >0.5
      OR KEV listing flipped to true, route directly to plan_template_lookup
      instead of TRACK terminus.
    when: |
      (state (ssvc_tier track))
      (or (state (epss_just_crossed_0_5 true))
          (state (kev_just_listed true)))
    then:
      - kind: goto
        target: plan_template_lookup

  - id: tier-escalate-defer-to-attend
    description: >-
      If a DEFER CVE's defer_until is past AND exposure metrics worsened,
      route to plan_template_lookup with ssvc_tier=attend hint.
    when: |
      (state (ssvc_tier defer))
      (state (defer_until_past true))
      (state (exposure_delta_negative true))
    then:
      - kind: assert
        fact: "ssvc_override"
        slots: '{"new_tier": "attend", "reason": "defer expired with worsened exposure"}'
      - kind: goto
        target: plan_template_lookup

  # -------------------------------------------------------------------
  # Template-lookup ranking — runs at plan_template_lookup; picks best
  # template among multiple hits before delegating to step 8 inline rules.
  # -------------------------------------------------------------------
  - id: template-rank-by-success
    description: >-
      When multiple templates match (cwe x asset_class x runtime), prefer
      the one with highest 30d success rate × 0.7 + recency × 0.3.
      Asserted as template_pick fact for downstream plan node.
    when: |
      (state (template_match_count >= 2))
    then:
      - kind: assert
        fact: "template_pick"
        slots: '{"strategy": "weighted_success_recency", "alpha": 0.7, "beta": 0.3}'

  # -------------------------------------------------------------------
  # Code-runtime preference — extractor may yield multiple candidate
  # runtimes for ambiguous vuln_class. Pick deterministic preference.
  # -------------------------------------------------------------------
  - id: runtime-prefer-ansible-on-network
    when: |
      (state (vuln_class network-protocol | routing | switching))
      (state (runtime_candidates_count >= 2))
    then:
      - kind: assert
        fact: "runtime_pick"
        slots: '{"runtime": "ansible", "reason": "network class default"}'

  - id: runtime-prefer-image-bump-on-container
    when: |
      (state (vuln_class container-image | container))
      (state (runtime_candidates_count >= 2))
    then:
      - kind: assert
        fact: "runtime_pick"
        slots: '{"runtime": "container_image_bump", "reason": "image class default"}'

  - id: runtime-prefer-k8s-on-host-os
    when: |
      (state (vuln_class host-os-package))
      (state (cluster_orchestrator k8s))
      (state (runtime_candidates_count >= 2))
    then:
      - kind: assert
        fact: "runtime_pick"
        slots: '{"runtime": "k8s", "reason": "host on k8s — patch via DaemonSet"}'

  # -------------------------------------------------------------------
  # Defer-until date — compute target re-evaluation epoch from EPSS
  # gradient. Higher EPSS shrinks the window.
  # -------------------------------------------------------------------
  - id: defer-window-by-epss
    when: |
      (state (ssvc_tier defer))
      (not (state (defer_until_set true)))
    then:
      - kind: assert
        fact: "defer_until_request"
        slots: '{"strategy": "epss_inverse", "min_days": 7, "max_days": 90}'

  # -------------------------------------------------------------------
  # Reflexion-buffer cross-CWE similarity — when no exact-class buffer
  # entries exist, use sibling CWE classes above similarity threshold.
  # -------------------------------------------------------------------
  - id: reflexion-cross-cwe-fallback
    when: |
      (state (reflexion_exact_match_count 0))
      (state (reflexion_sibling_above_threshold_count >= 1))
    then:
      - kind: assert
        fact: "reflexion_use_siblings"
        slots: '{"similarity_floor": 0.65, "max_entries": 5}'

  # -------------------------------------------------------------------
  # Sandbox-runtime override on edge cases.
  # -------------------------------------------------------------------
  - id: sandbox-prefer-static-when-air-gapped
    description: >-
      Air-gapped envs cannot deploy CargoNet labs reliably; force
      static-detection for any vuln_class except logic-flaw.
    when: |
      (state (deployment_air_gapped true))
      (not (state (vuln_class logic-flaw | business-rule | no-probe)))
    then:
      - kind: assert
        fact: "sandbox_override"
        slots: '{"runtime": "static_detection", "reason": "air-gapped env"}'

  # -------------------------------------------------------------------
  # Defer-until date computation — moves DEFER decisions forward by
  # the appropriate window without operator intervention.
  # -------------------------------------------------------------------
  - id: defer-until-window-by-cwe-class
    description: >-
      Computed defer_until horizon is CWE-class-dependent: business-rule
      flaws get 90d, info-disclosure 60d, anything else 30d. Asserted
      so phase-2 ssvc_evaluate has a deterministic horizon when tier=DEFER.
    when: |
      (state (ssvc_tier defer))
      (state (cwe_class ?cwe))
    then:
      - kind: assert
        fact: "defer_until_window"
        slots: '{"days_by_cwe": {"business-rule": 90, "info-disclosure": 60, "default": 30}}'

  # -------------------------------------------------------------------
  # Code-runtime preference for terraform vs ansible vs k8s on
  # ambiguous extractor output.
  # -------------------------------------------------------------------
  - id: runtime-prefer-terraform-on-cloud-iaas
    description: >-
      Cloud-IaaS-class vulns (s3 bucket policy, IAM, KMS) prefer terraform
      over ansible since they're declarative-state, not imperative-package.
    when: |
      (state (vuln_class cloud-iaas | iam | kms-policy | s3-bucket))
      (state (runtime_candidates_count >= 2))
    then:
      - kind: assert
        fact: "runtime_pick"
        slots: '{"runtime": "terraform", "reason": "cloud-iaas declarative state"}'

  - id: runtime-prefer-k8s-on-container
    description: >-
      Container-image-bump or k8s-rbac vulns prefer the k8s code-writer
      since image patches and RBAC changes are k8s-native.
    when: |
      (state (vuln_class container-image | k8s-rbac | helm-chart))
      (state (runtime_candidates_count >= 2))
    then:
      - kind: assert
        fact: "runtime_pick"
        slots: '{"runtime": "k8s", "reason": "k8s-native vuln class"}'

id: cve_rem.offline_isolation
version: '1.0'
flavor: governance
api_version: '1'
harbor_facts_version: '1.0'
description: "Phase-6 host-isolation invariants. Operators assert cve_rem.network_edge\
  \ facts (one per active socket / route) and cve_rem.replica_load facts (one per\
  \ replica pull). Rules emit halt-severity bosun.violation when:\n\n  - any inbound\
  \ edge originates from production\n  - any egress edge targets a destination other\
  \ than the signed\n    prompts.tar drop\n  - replica load occurs without an attached\
  \ redaction-pack-hash that\n    matches the currently-signed cve_rem.redaction_pack\
  \ fact"
ruleset_file: rules.clp
provides:
- harbor_facts:cve_rem.network_edge
- harbor_facts:cve_rem.replica_load
- harbor_facts:cve_rem.redaction_pack
- harbor_facts:bosun.violation
rules: []

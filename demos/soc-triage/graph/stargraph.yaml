# SPDX-License-Identifier: Apache-2.0
#
# SOC Triage++ — everything-demo-shaped triage pipeline with an ONNX MLNode.
#
# Modeled on demos/everything-demo/graph/stargraph.yaml (node-kind skeleton,
# interrupt HITL gate, governance pack mount, routing rules) but trimmed to
# the IRDocument-clean shape that `stargraph serve --graph` + the graph_viewer
# IRDocument validator both accept (see demos/sentinel_dark_watch/graph for
# the serve-compatible reference — everything-demo's richer serve-only fields
# like `capabilities:`/`embedding:`/`stores:`-as-dict fail IRDocument).
#
# Pipeline (linear, with a policy-driven HITL branch):
#
#   ingest (IngestAlert, custom)
#     └─► retrieval (RetrievalPriors, custom — RRF over data/priors/)
#           └─► risk_score (ml — ONNX, sha256-pinned MLNode, output_field=risk)
#                 └─► triage_decide (dspy — LLM disposition + reason)
#                       └─► soc_policy (passthrough — Bosun `soc-policy` pack
#                             fires here; rules below route on the facts it
#                             emits: prod+auto_remediate / escalate → HITL)
#                             ├─[auto_remediate@prod | escalate]─► analyst_gate
#                             │                                     (interrupt, HITL)
#                             │                                       └─► write_artifact
#                             └─[else]──────────────────────────────► write_artifact
#                                   └─► audit (AuditChain — seals provenance
#                                         into a hash-chained JSONL record) └─► halt
#
# Node kinds: custom `module:Class` (ingest, retrieval) + stargraph builtins
# (`ml`, `dspy`, `interrupt`, `write_artifact`, `passthrough`, `echo`).

ir_version: "1.0.0"
id: "graph:soc-triage"

# State model — RunState lives in graph/state.py. The demo dir is `soc-triage`
# (hyphen → not a Python package), so serve_soc.py inserts demos/soc-triage on
# sys.path and `graph/` is the top-level package (see .progress.md task 1.28).
state_class: "graph.state:RunState"

nodes:
  - id: ingest
    kind: "graph.nodes:IngestAlert"

  - id: retrieval
    kind: "graph.nodes:RetrievalPriors"

  # ONNX severity classifier — sha256-pinned (scripts/train_severity.py output).
  # MLNode(**config): reads the feature vector from `features`, writes the
  # label int to `risk` (output[0]). file_uri is left null in the committed IR
  # so the graph validates portably; serve_soc.py (task 1.33) injects the
  # absolute file:// URI of models/severity_classifier.onnx at boot, where the
  # expected_sha256 pin below is verified on load by stargraph.ml.loaders.
  - id: risk_score
    kind: ml
    config:
      model_id: soc-severity
      version: "1.0.0"
      runtime: onnx
      file_uri: null
      expected_sha256: "c314b6f678f4fcf265736c3f1de21c3f5284b7804c1cdd1f9965d41dd325ce2b"
      input_field: features
      output_field: risk

  - id: triage_decide
    kind: dspy

  # soc-policy governance pack (mounted below) fires on this node; the routing
  # rules read the disposition/asset_tier facts it asserts. Passthrough keeps
  # the node a pure dispatch point (no side effect) — the policy lives in Bosun.
  - id: soc_policy
    kind: passthrough

  # HITL gate — the bypass-Fathom InterruptNode (stargraph.nodes.interrupt) raises
  # the pause signal on dispatch, so the analyst gate halts the run to
  # awaiting-input even when serve runs Fathom-less (deps['fathom']=None). The
  # prompt + requested capability live in the node config; resume via
  # POST /v1/runs/{id}/respond gated on `runs:respond`.
  - id: analyst_gate
    kind: interrupt
    config:
      prompt: "Approve disposition {disposition} for alert {alert_id} (risk={risk}, asset={asset_id}/{asset_tier})?"
      requested_capability: "runs:respond"
      interrupt_payload:
        requested_capability: "runs:respond"
      # Finite wait bound (15 min) so the loop takes its hot-resume path: the
      # execute() arm blocks on ``_respond_event`` while awaiting-input instead
      # of exiting cold. ``POST /v1/runs/{id}/respond`` sets that event, waking
      # the *same* live loop, which then advances past the gate to
      # write_artifact → audit → halt (the cold-restart resume path re-runs the
      # graph from node 0 and is not wired for serve — see spec .progress.md
      # 5.3). on_timeout=halt keeps an unanswered gate terminal, not hung.
      timeout: "PT900S"
      on_timeout: "halt"

  # Demo-local case-note writer (graph.nodes:SocWriteArtifact). NOT the builtin
  # ``write_artifact`` kind: that node's WriteArtifactContext protocol needs
  # ``step`` / ``artifact_store`` / ``is_replay`` attributes the serve-path
  # GraphRun does not carry (the scheduler hard-codes GraphRun(...) with no
  # artifact-store wiring), so the builtin raises AttributeError the instant a
  # resumed HITL run reaches it. The custom node needs only ``run_id`` and
  # completes the resumed run's tail end-to-end (spec .progress.md 5.3 fix).
  - id: write_artifact
    kind: "graph.nodes:SocWriteArtifact"

  # Audit sink — seals the run's append-only provenance trail into a
  # hash-chained JSONL audit record (.audit/<run_id>.jsonl) so the chain is
  # tamper-evident offline. Custom node (not the silent passthrough EchoNode)
  # so the audit step records the evidence chain. The full Ed25519/JWS
  # serve-side sink (stargraph.audit.jsonl.ChainedJSONLAuditSink) is a documented
  # stargraph-lib gap — the serve run path never drains the bus into it.
  - id: audit
    kind: "graph.nodes:AuditChain"

  - id: halt
    kind: echo

# ---------------------------------------------------------------------------
# Governance — the signed `soc-policy` Bosun pack (created in task 1.31,
# dir bosun-packs/soc-policy) + the stock budgets/audit packs. Mounted the
# way everything-demo/sdw mount packs (id + version + requires compat block).
# The pack's CLIPS rules emit the routing facts the rules section reads.
# ---------------------------------------------------------------------------
governance:
  - id: stargraph.bosun.budgets
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }
  - id: stargraph.bosun.audit
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }
  - id: soc-policy
    version: "1.0"
    requires: { stargraph_facts_version: "1.0", api_version: "1" }

# ---------------------------------------------------------------------------
# Rules — linear chain + the soc-policy HITL branch. Every rule is owned by
# the node named in its `(node-id (id ...))` pattern (CLIPS-style `when`).
# ---------------------------------------------------------------------------
rules:
  - id: r-ingest-to-retrieval
    when: "?n <- (node-id (id ingest))"
    then: [{ kind: goto, target: retrieval }]

  - id: r-retrieval-to-risk
    when: "?n <- (node-id (id retrieval))"
    then: [{ kind: goto, target: risk_score }]

  - id: r-risk-to-triage
    when: "?n <- (node-id (id risk_score))"
    then: [{ kind: goto, target: triage_decide }]

  - id: r-triage-to-policy
    when: "?n <- (node-id (id triage_decide))"
    then: [{ kind: goto, target: soc_policy }]

  # --- soc-policy routing branch -----------------------------------------
  # prod asset auto-remediation → require an analyst to confirm (HITL).
  - id: r-policy-prod-autoremediate-hitl
    when: "?n <- (node-id (id soc_policy)) (state (asset_tier prod)) (state (disposition auto_remediate))"
    then: [{ kind: goto, target: analyst_gate }]

  # explicit escalation / second-opinion → HITL.
  - id: r-policy-escalate-hitl
    when: "?n <- (node-id (id soc_policy)) (state (disposition escalate))"
    then: [{ kind: goto, target: analyst_gate }]

  # everything else (dismiss, or non-prod auto_remediate) → straight to artifact.
  - id: r-policy-auto-to-artifact
    when: "?n <- (node-id (id soc_policy)) (state (disposition dismiss | needs_human))"
    then: [{ kind: goto, target: write_artifact }]

  # --- HITL gate ---------------------------------------------------------
  - id: r-analyst-gate
    when: "?n <- (node-id (id analyst_gate))"
    then:
      - kind: interrupt
        prompt: "Approve disposition {disposition} for alert {alert_id} (risk={risk}, asset={asset_id}/{asset_tier})?"
        interrupt_payload:
          requested_capability: "runs:respond"
        requested_capability: "runs:respond"
        timeout: null
        on_timeout: "halt"

  - id: r-analyst-to-artifact
    when: "?n <- (node-id (id analyst_gate))"
    then: [{ kind: goto, target: write_artifact }]

  # --- terminal chain ----------------------------------------------------
  - id: r-artifact-to-audit
    when: "?n <- (node-id (id write_artifact))"
    then: [{ kind: goto, target: audit }]

  - id: r-audit-to-halt
    when: "?n <- (node-id (id audit))"
    then: [{ kind: goto, target: halt }]

  - id: r-halt
    when: "?n <- (node-id (id halt))"
    then: [{ kind: halt, reason: "soc-triage++: run complete" }]
